<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Crash Effect</title>
<style>
body{
  background:#050505;
  color:#e8e8e8;
  font-family:"Courier New", monospace;
  margin:0;
  padding:40px;
  min-height:100vh;
  overflow:hidden;
}
.screen{
  max-width:900px;
  margin:0 auto;
  font-size:19px;
  line-height:1.45;
  white-space:pre-wrap;
}
.line{
  display:block;
  min-height:1.45em;
}
.cursor{
  display:inline;
  animation:blink 1s steps(1) infinite;
}
@keyframes blink{50%{opacity:0;}}
@media (max-width:700px){
  body{padding:24px;}
  .screen{font-size:16px;line-height:1.35;}
  .line{min-height:1.35em;}
}
</style>
</head>
<body>

<div class="screen" id="screen"></div>

<script>
// helper για τυχαία γράμματα/σύμβολα
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()[]{}<>?/|\\~";

function randomChar(){ return chars.charAt(Math.floor(Math.random()*chars.length)); }

const screen = document.getElementById("screen");
const lines = [
  "RUNNING BEHAVIORAL ANALYSIS...",
  "INTERPRETING USER RESPONSE...",
  "GENERATING PROFILE...",
  ""
];

const finalWarning = "GET OUT!";
const finalUrgency = "NOW!";

let currentLineIndex = 0;
let currentCharIndex = 0;
let currentLineEl = null;
let finalCharIndex = 0;
let finalLineEl = null;
let urgencyCharIndex = 0;
let urgencyLineEl = null;
const cursor = document.createElement("span");
cursor.className="cursor"; cursor.textContent="_";

function startLine(){
  currentLineEl = document.createElement("div");
  currentLineEl.className="line";
  screen.appendChild(currentLineEl);
  currentLineEl.appendChild(cursor);
}

function typeNext(){
  if(currentLineIndex>=lines.length){showStats(); return;}
  if(!currentLineEl) startLine();
  const lineText=lines[currentLineIndex];
  if(currentCharIndex<lineText.length){
    const textNode=document.createTextNode(lineText.charAt(currentCharIndex));
    currentLineEl.insertBefore(textNode,cursor);
    currentCharIndex++;
    setTimeout(typeNext,95); return;
  }
  setTimeout(()=>{
    currentLineIndex++;
    currentCharIndex=0;
    currentLineEl=null;
    typeNext();
  },800);
}

function showStats(){
  const panel=document.createElement("div");
  panel.className="line";
  panel.innerHTML=`
    [CURIOSITY] 84% 
    [WARNING] 22%
    [TRUST] 76%
    [SUSCEPTIBILITY] 91%
    [STABILITY] 68%
  `;
  screen.appendChild(panel);
  // μετά 1 δευτ., ξεκινάει το “hacked collapse”
  setTimeout(dramaticCollapse,1000);
}

function dramaticCollapse(){
  const elems = screen.querySelectorAll(".line");
  let steps=0;
  const interval = setInterval(()=>{
    elems.forEach(el=>{
      let text=el.textContent;
      text=text.split("").map(c=>Math.random()<0.3?randomChar():c).join("");
      el.textContent=text;
    });
    steps++;
    if(steps>15){
      clearInterval(interval);
      startGetOut();
    }
  },50);
  // flicker background
  let flicker=0;
  const flick = setInterval(()=>{
    document.body.style.background=flicker%2===0?"#000":"#050505";
    flick++;
    if(flick>15) clearInterval(flick);
  },50);
}

function startGetOut(){
  screen.innerHTML="";
  finalLineEl=document.createElement("div");
  finalLineEl.className="line";
  screen.appendChild(finalLineEl);
  finalLineEl.appendChild(cursor);
  typeFinalWarning();
}

function typeFinalWarning(){
  if(finalCharIndex<finalWarning.length){
    const textNode=document.createTextNode(finalWarning.charAt(finalCharIndex));
    finalLineEl.insertBefore(textNode,cursor);
    finalCharIndex++;
    setTimeout(typeFinalWarning,50+Math.random()*180);
  } else {
    setTimeout(()=>{
      urgencyLineEl=document.createElement("div");
      urgencyLineEl.className="line";
      screen.appendChild(urgencyLineEl);
      urgencyLineEl.appendChild(cursor);
      typeUrgency();
    },3000);
  }
}

function typeUrgency(){
  if(urgencyCharIndex<finalUrgency.length){
    const textNode=document.createTextNode(finalUrgency.charAt(urgencyCharIndex));
    urgencyLineEl.insertBefore(textNode,cursor);
    urgencyCharIndex++;
    setTimeout(typeUrgency,80+Math.random()*120);
  }
}

typeNext();
</script>
</body>
</html>
