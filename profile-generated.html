<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Generated</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-V90RVSJZCT"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-V90RVSJZCT');

<style>
body{
background:#050505;
color:#e8e8e8;
font-family:"Lucida Console";
margin:0;
padding:28px 18px;
min-height:100vh;
overflow:hidden;
}

.screen{
max-width:900px;
margin:0 auto;
font-size:20px;
line-height:1.5;
white-space:pre-wrap;
position:relative;
z-index:2;
font-family:"Lucida Console";
transform-origin:center center;
}

.line{
display:block;
min-height:1.5em;
position:relative;
font-family:"Lucida Console";
}

.cursor{
display:inline;
animation:blink 1s steps(1) infinite;
font-family:"Lucida Console";
}

.stats-wrap{
margin-top:4px;
display:flex;
flex-direction:column;
gap:5px;
font-family:"Lucida Console";
}

.stat-row{
display:grid;
grid-template-columns:245px 1fr 60px;
align-items:center;
column-gap:10px;
font-size:15px;
line-height:1.15;
min-height:24px;
position:relative;
font-family:"Lucida Console";
}

.stat-label,
.stat-value{
font-family:"Lucida Console";
}

.stat-label{
white-space:nowrap;
}

.stat-bar{
height:9px;
border:1px solid #2a2a2a;
background:#0f0f0f;
position:relative;
overflow:hidden;
}

.stat-fill{
height:100%;
width:0%;
background:#e8e8e8;
transition:width 0.28s ease;
}

.stat-value{
text-align:right;
}

.big-warning{
position:fixed;
left:50%;
top:32%;
transform:translate(-50%,-50%);
font-size:54px;
line-height:1.08;
letter-spacing:3px;
text-align:center;
opacity:0;
pointer-events:none;
z-index:20;
color:#f2f2f2;
text-shadow:0 0 12px rgba(255,255,255,0.15);
white-space:pre-line;
font-family:"Lucida Console";
}

.big-warning.show{
opacity:1;
}

/* EXIT BUTTON */
.exit-btn{
position:fixed;
left:50%;
top:58%;
transform:translate(-50%,-50%);
font-family:"Lucida Console";
font-size:16px;
letter-spacing:0.25em;
color:#e8e8e8;
background:transparent;
border:1px solid #e8e8e8;
padding:12px 36px;
cursor:pointer;
opacity:0;
pointer-events:none;
z-index:21;
text-decoration:none;
display:block;
text-align:center;
transition:opacity 0.2s ease;
}

.exit-btn.show{
opacity:1;
pointer-events:auto;
}

.exit-btn.glitching{
animation:btnGlitch 0.08s steps(1) infinite;
}

@keyframes btnGlitch{
0%{
  transform:translate(-50%,-50%) skewX(0deg);
  filter:none;
  border-color:#e8e8e8;
  color:#e8e8e8;
}
20%{
  transform:translate(calc(-50% + 3px),-50%) skewX(4deg);
  filter:brightness(2) hue-rotate(90deg);
  border-color:#ff0080;
  color:#ff0080;
}
40%{
  transform:translate(calc(-50% - 4px),-50%) skewX(-3deg);
  filter:brightness(1.5) hue-rotate(180deg);
  border-color:#00ffff;
  color:#00ffff;
}
60%{
  transform:translate(calc(-50% + 2px),calc(-50% + 2px)) skewX(2deg);
  filter:brightness(2) hue-rotate(270deg);
  border-color:#ffffff;
  color:#ffffff;
}
80%{
  transform:translate(calc(-50% - 2px),calc(-50% - 1px)) skewX(-5deg);
  filter:brightness(1.8) hue-rotate(45deg);
  border-color:#ff0080;
  color:#ff0080;
}
100%{
  transform:translate(-50%,-50%) skewX(0deg);
  filter:none;
  border-color:#e8e8e8;
  color:#e8e8e8;
}
}

@keyframes statGlitch{
0%{
  transform:skewX(0deg) translateX(0);
  color:#e8e8e8;
}
20%{
  transform:skewX(4deg) translateX(3px);
  color:#ff0080;
}
40%{
  transform:skewX(-3deg) translateX(-4px);
  color:#00ffff;
}
60%{
  transform:skewX(2deg) translateX(2px);
  color:#ff0080;
}
80%{
  transform:skewX(-5deg) translateX(-2px);
  color:#00ffff;
}
100%{
  transform:skewX(0deg) translateX(0);
  color:#e8e8e8;
}
}

body.hacking{
animation:screenGlitch 0.08s steps(1) infinite;
}

@keyframes screenGlitch{
0%{
  transform:skewX(0deg) translateX(0);
  color:#e8e8e8;
}
20%{
  transform:skewX(1.5deg) translateX(3px);
  color:#ff0080;
}
40%{
  transform:skewX(-2deg) translateX(-4px);
  color:#00ffff;
}
60%{
  transform:skewX(1deg) translateX(2px);
  color:#ff0080;
}
80%{
  transform:skewX(-1.5deg) translateX(-2px);
  color:#00ffff;
}
100%{
  transform:skewX(0deg) translateX(0);
  color:#e8e8e8;
}
}

.flash{
position:fixed;
inset:0;
background:rgba(255,255,255,0.09);
opacity:0;
pointer-events:none;
z-index:12;
}

.flash.show{
animation:flashBang 620ms ease-out forwards;
}

.prehack-flicker{
position:fixed;
inset:0;
background:rgba(255,255,255,0.07);
opacity:0;
pointer-events:none;
z-index:11;
mix-blend-mode:screen;
}

.crt-overlay{
position:fixed;
inset:0;
pointer-events:none;
z-index:13;
opacity:0;
mix-blend-mode:screen;
}

.crt-overlay.active{
opacity:1;
}

.crt-overlay::before,
.crt-overlay::after{
content:"";
position:absolute;
inset:0;
pointer-events:none;
}

.crt-overlay::before{
display:none;
}

.crt-overlay::after{
background:transparent;
}

.crt-overlay.active{
opacity:1;
animation:screenGlitch 0.08s steps(1) infinite;
}

@keyframes screenGlitch{
0%{
  transform:skewX(0deg) translateX(0);
  filter:none;
  opacity:0.6;
}
20%{
  transform:skewX(1.5deg) translateX(3px);
  filter:hue-rotate(90deg) brightness(1.4);
  opacity:0.8;
}
40%{
  transform:skewX(-2deg) translateX(-4px);
  filter:hue-rotate(180deg) brightness(1.2);
  opacity:0.7;
}
60%{
  transform:skewX(1deg) translateX(2px);
  filter:hue-rotate(270deg) brightness(1.5);
  opacity:0.9;
}
80%{
  transform:skewX(-1.5deg) translateX(-2px);
  filter:hue-rotate(45deg) brightness(1.3);
  opacity:0.75;
}
100%{
  transform:skewX(0deg) translateX(0);
  filter:none;
  opacity:0.6;
}
}

.fragment{
position:fixed;
pointer-events:none;
z-index:15;
background:#e8e8e8;
opacity:1;
will-change:transform,left,top,opacity;
transform-origin:center center;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

@keyframes flashBang{
0%{opacity:0;}
18%{opacity:1;}
100%{opacity:0;}
}

@media (max-width:900px){
body{
padding:18px 14px;
}
.screen{
font-size:15px;
line-height:1.4;
}
.line{
min-height:1.4em;
}
.stat-row{
grid-template-columns:1fr;
row-gap:3px;
min-height:auto;
font-size:12px;
margin-bottom:3px;
}
.stat-bar{
height:8px;
}
.stat-value{
text-align:left;
}
.big-warning{
top:30%;
font-size:34px;
letter-spacing:2px;
line-height:1.12;
font-family:"Lucida Console";
}
.exit-btn{
font-size:13px;
padding:10px 24px;
top:56%;
}
}
</style>

<body>

<div class="screen" id="screen"></div>
<div class="prehack-flicker" id="preFlicker"></div>
<div class="crt-overlay" id="crtOverlay"></div>
<div class="flash" id="flash"></div>
<div class="big-warning" id="getOut"></div>
<a class="exit-btn" id="exitBtn" href="https://evevaia.github.io/data-mining-backrooms/info.html">EXIT</a>

<script>
const screen = document.getElementById("screen");
const flash = document.getElementById("flash");
const preFlicker = document.getElementById("preFlicker");
const crtOverlay = document.getElementById("crtOverlay");
const getOut = document.getElementById("getOut");
const exitBtn = document.getElementById("exitBtn");

const introLines = [
  "RUNNING BEHAVIORAL ANALYSIS...",
  "INTERPRETING USER RESPONSE...",
  "GENERATING PROFILE...",
  ""
];

const stats = [
  { label: "CURIOSITY INDEX", value: 92 },
  { label: "WARNING RESISTANCE", value: 14 },
  { label: "SYMBOLIC TRUST", value: 81 },
  { label: "PERSONALIZATION RESPONSE", value: 88 },
  { label: "ADAPTIVE TARGETING", value: 97 },
  { label: "PROFILE STATUS", value: 100, textValue: "GENERATED" }
];

let currentLineIndex = 0;
let currentCharIndex = 0;
let currentLineEl = null;
let statsWrap = null;
let scrambleInterval = null;
let barInterval = null;
let physicsRunning = false;
let trembleInterval = null;
let crtInterval = null;
let glitchTimeout = null;

const cursor = document.createElement("span");
cursor.className = "cursor";
cursor.textContent = "_";

// irregular glitch pattern: [normalDuration, glitchDuration] in ms
const glitchPattern = [
  [2000, 600],
  [5000, 400],
  [2000, 700],
  [8000, 300],
  [3000, 500],
  [6000, 800],
  [2000, 400],
];

function startGlitchCycle(patternIndex){
  const pattern = glitchPattern[patternIndex % glitchPattern.length];
  const normalDur = pattern[0];
  const glitchDur = pattern[1];

  exitBtn.classList.remove("glitching");
  glitchTimeout = setTimeout(function(){
    exitBtn.classList.add("glitching");
    glitchTimeout = setTimeout(function(){
      startGlitchCycle(patternIndex + 1);
    }, glitchDur);
  }, normalDur);
}

function showExitBtn(){
  exitBtn.classList.add("show");
  exitBtn.classList.add("glitching");
  setTimeout(function(){
    exitBtn.classList.remove("glitching");
    exitBtn.textContent = "EXIT";
    setTimeout(function(){
      startGlitchCycle(0);
    }, 400);
  }, 800);
}

function startLine() {
  currentLineEl = document.createElement("div");
  currentLineEl.className = "line particle-target";
  screen.appendChild(currentLineEl);
  currentLineEl.appendChild(cursor);
}

function typeNext() {
  if (currentLineIndex >= introLines.length) {
    revealStats();
    return;
  }

  if (!currentLineEl) {
    startLine();
  }

  const lineText = introLines[currentLineIndex];

  if (currentCharIndex < lineText.length) {
    const textNode = document.createTextNode(lineText.charAt(currentCharIndex));
    currentLineEl.insertBefore(textNode, cursor);
    currentCharIndex++;
    setTimeout(typeNext, 78);
    return;
  }

  if (currentLineIndex === 0 || currentLineIndex === 1 || currentLineIndex === 2) {
    setTimeout(() => {
      currentLineIndex++;
      currentCharIndex = 0;
      currentLineEl = null;
      typeNext();
    }, 2200);
    return;
  }

  if (lineText === "" && currentLineIndex === 3) {
    flickerPause(0);
    return;
  }

  currentLineIndex++;
  currentCharIndex = 0;
  currentLineEl = null;
  setTimeout(typeNext, 220);
}

function flickerPause(count) {
  if (count < 12) {
    cursor.style.opacity = cursor.style.opacity === "0" ? "1" : "0";
    setTimeout(() => flickerPause(count + 1), 120);
  } else {
    cursor.style.opacity = "1";
    currentLineIndex++;
    currentCharIndex = 0;
    currentLineEl = null;
    setTimeout(typeNext, 220);
  }
}

function revealStats() {
  if (cursor.parentNode) {
    cursor.parentNode.removeChild(cursor);
  }

  statsWrap = document.createElement("div");
  statsWrap.className = "stats-wrap particle-target";
  screen.appendChild(statsWrap);

  let i = 0;
  function addNextStat() {
    if (i >= stats.length) {
      // single glitch beat — 150ms
      const targets = Array.from(document.querySelectorAll(".particle-target"));
      targets.forEach(el => {
        el.style.animation = "statGlitch 0.08s steps(1) infinite";
      });

      // stop glitch after 150ms — visible but not quite readable for 500ms
      setTimeout(function(){
        targets.forEach(el => {
          el.style.animation = "";
          el.style.color = "";
          el.style.transform = "";
        });

        // after 1000ms of being visible, start hack phase
        setTimeout(startHackPhase, 1000);
      }, 150);
      return;
    }

    const stat = stats[i];
    const row = document.createElement("div");
    row.className = "stat-row particle-target";
    row.dataset.baseLabel = stat.label;
    row.dataset.baseValue = String(stat.value);

    const label = document.createElement("div");
    label.className = "stat-label";
    label.textContent = stat.label + ":";

    const bar = document.createElement("div");
    bar.className = "stat-bar";

    const fill = document.createElement("div");
    fill.className = "stat-fill";
    fill.dataset.baseWidth = String(stat.value);
    bar.appendChild(fill);

    const value = document.createElement("div");
    value.className = "stat-value";
    value.textContent = stat.textValue ? stat.textValue : stat.value + "%";
    value.dataset.mode = stat.textValue ? "text" : "percent";

    row.appendChild(label);
    row.appendChild(bar);
    row.appendChild(value);
    statsWrap.appendChild(row);

    requestAnimationFrame(() => {
      fill.style.width = stat.value + "%";
    });

    i++;
    setTimeout(addNextStat, 120);
  }

  addNextStat();
}

function runPreHackFlicker() {
  // apply button-style glitch to all stat rows
  const targets = Array.from(document.querySelectorAll(".particle-target"));
  
  targets.forEach(el => {
    el.style.animation = "statGlitch 0.08s steps(1) infinite";
  });

  setTimeout(function(){
    targets.forEach(el => {
      el.style.animation = "";
      el.style.color = "";
      el.style.transform = "";
    });
    setTimeout(startHackPhase, 100);
  }, 800);
}

function startHackPhase() {
  const labels = Array.from(document.querySelectorAll(".stat-label"));
  const values = Array.from(document.querySelectorAll(".stat-value"));
  const fills = Array.from(document.querySelectorAll(".stat-fill"));
  const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#$%&@!?/\\\\[]{}<>*";

  startCRTBleed();

  scrambleInterval = setInterval(() => {
    labels.forEach((el) => {
      const base = el.parentElement.dataset.baseLabel + ":";
      el.textContent = scrambleText(base, charset, 0.72);
    });

    values.forEach((el) => {
      const mode = el.dataset.mode;
      if (mode === "percent") {
        const n = Math.floor(Math.random() * 100);
        el.textContent = scrambleText(String(n) + "%", charset, 0.55);
      } else {
        el.textContent = scrambleText("GENERATED", charset, 0.64);
      }
    });
  }, 60);

  barInterval = setInterval(() => {
    fills.forEach((fill) => {
      const base = Number(fill.dataset.baseWidth || 50);
      let jitter = base + Math.floor((Math.random() - 0.5) * 82);
      jitter = Math.max(2, Math.min(100, jitter));
      fill.style.width = jitter + "%";
    });
  }, 70);

  setTimeout(() => {
    startTremblePhase();
  }, 950);

  setTimeout(() => {
    clearInterval(scrambleInterval);
    clearInterval(barInterval);
    stopCRTBleed();
    stopTremblePhase();
    explodeScreen();
  }, 3400);
}

function startCRTBleed() {
  document.body.classList.add("hacking");
  crtInterval = setInterval(() => {
    const x = (Math.random() - 0.5) * 3.2;
    const y = (Math.random() - 0.5) * 2.2;
    const skew = (Math.random() - 0.5) * 1.3;
    const hue = Math.floor(Math.random() * 360);
    const brightness = 0.92 + Math.random() * 0.3;
    screen.style.filter = `contrast(${1 + Math.random() * 0.15}) brightness(${brightness}) hue-rotate(${hue}deg)`;
    screen.style.transform = `translate(${x}px, ${y}px) skewX(${skew}deg)`;
  }, 85);
}

function stopCRTBleed() {
  if (crtInterval) {
    clearInterval(crtInterval);
    crtInterval = null;
  }
  document.body.classList.remove("hacking");
  screen.style.filter = "";
  screen.style.transform = "";
  crtOverlay.classList.remove("active");
}

function startTremblePhase() {
  const targets = Array.from(document.querySelectorAll(".particle-target"));
  const startTime = performance.now();
  const buildDuration = 4500;

  trembleInterval = setInterval(() => {
    const elapsed = performance.now() - startTime;
    const progress = Math.min(elapsed / buildDuration, 1);

    const eased = Math.pow(progress, 2.5);
    const strength = 0.1 + eased * 12;
    const rotateStrength = 0.01 + eased * 2.4;

    targets.forEach((el) => {
      const tx = (Math.random() - 0.5) * strength;
      const ty = (Math.random() - 0.5) * strength;
      const rot = (Math.random() - 0.5) * rotateStrength;
      el.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
    });
  }, 45);
}

function stopTremblePhase() {
  if (trembleInterval) {
    clearInterval(trembleInterval);
    trembleInterval = null;
  }
  const targets = Array.from(document.querySelectorAll(".particle-target"));
  targets.forEach((el) => {
    el.style.transform = "";
  });
}

function scrambleText(text, chars, intensity) {
  let out = "";
  for (let i = 0; i < text.length; i++) {
    if (text[i] === " ") {
      out += " ";
      continue;
    }
    if (Math.random() < intensity) {
      out += chars[Math.floor(Math.random() * chars.length)];
    } else {
      out += text[i];
    }
  }
  return out;
}

function explodeScreen() {
  flash.classList.add("show");

  const targets = Array.from(document.querySelectorAll(".particle-target")).filter(el => {
    const r = el.getBoundingClientRect();
    return r.width > 0 && r.height > 0;
  });

  const pieces = [];

  targets.forEach((el) => {
    const rect = el.getBoundingClientRect();
    const cols = Math.max(7, Math.min(22, Math.floor(rect.width / 28)));
    const rows = Math.max(3, Math.min(10, Math.floor(rect.height / 13)));
    const pieceW = rect.width / cols;
    const pieceH = rect.height / rows;

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const frag = document.createElement("div");
        frag.className = "fragment";

        const w = Math.max(2, pieceW - 0.5);
        const h = Math.max(2, pieceH - 0.5);
        const x = rect.left + col * pieceW;
        const y = rect.top + row * pieceH;

        frag.style.left = x + "px";
        frag.style.top = y + "px";
        frag.style.width = w + "px";
        frag.style.height = h + "px";

        document.body.appendChild(frag);

        const vx = (Math.random() - 0.5) * 11;
        const vy = -Math.random() * 7 - 2;
        const initialTilt = (Math.random() - 0.5) * 10;

        pieces.push({
          el: frag,
          x,
          y,
          w,
          h,
          vx,
          vy,
          rot: initialTilt,
          settled: false
        });
      }
    }

    el.style.visibility = "hidden";
  });

  runPhysics(pieces);

  // GET OUT. appears at 2800ms
  setTimeout(() => {
    typeBigWarning(getOut, "GET OUT.");
  }, 2800);

  // EXIT button appears at 5000ms (between GET OUT and NOW)
  setTimeout(() => {
    showExitBtn();
  }, 5000);

  // NOW! appears at 7600ms
  setTimeout(() => {
    appendWarningLine(getOut, "NOW!");
  }, 7600);
}

function runPhysics(pieces) {
  if (physicsRunning) return;
  physicsRunning = true;

  const gravity = 0.26;
  const bounce = 0.06;
  const friction = 0.992;
  const floorFriction = 0.88;

  function frame() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    for (let i = 0; i < pieces.length; i++) {
      const p = pieces[i];
      if (!p.el) continue;

      if (!p.settled) {
        p.vy += gravity;
        p.vx *= friction;

        p.x += p.vx;
        p.y += p.vy;

        if (Math.abs(p.vx) > 0.02) {
          p.rot += p.vx * 0.15;
        }

        if (p.x <= 0) {
          p.x = 0;
          p.vx *= -0.25;
        }

        if (p.x + p.w >= vw) {
          p.x = vw - p.w;
          p.vx *= -0.25;
        }

        if (p.y <= 0) {
          p.y = 0;
          p.vy *= -0.12;
        }

        let floorY = vh - p.h;

        for (let j = 0; j < pieces.length; j++) {
          if (i === j) continue;
          const other = pieces[j];
          if (!other.settled) continue;

          const overlapX = p.x < other.x + other.w && p.x + p.w > other.x;
          const nearTop = p.y + p.h >= other.y - 2 && p.y + p.h <= other.y + other.h * 0.6;

          if (overlapX && nearTop) {
            floorY = Math.min(floorY, other.y - p.h);
          }
        }

        if (p.y >= floorY) {
          p.y = floorY;
          p.vy *= -bounce;
          p.vx *= floorFriction;

          if (Math.abs(p.vy) < 0.45) {
            p.vy = 0;
          }

          if (Math.abs(p.vx) < 0.18 && Math.abs(p.vy) === 0) {
            p.vx = 0;
            p.rot *= 0.55;

            if (Math.abs(p.rot) < 0.8) {
              p.rot = 0;
              p.settled = true;
            }
          }
        }
      }

      p.el.style.left = p.x + "px";
      p.el.style.top = p.y + "px";
      p.el.style.transform = `rotate(${p.rot}deg)`;
    }

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
}

function typeBigWarning(el, text) {
  el.innerHTML = "";
  el.classList.add("show");

  const textNode = document.createTextNode("");
  const warningCursor = document.createElement("span");
  warningCursor.className = "cursor";
  warningCursor.textContent = "_";

  el.appendChild(textNode);
  el.appendChild(warningCursor);

  let i = 0;

  function typeChar() {
    if (i >= text.length) return;
    textNode.textContent += text.charAt(i);
    i++;
    setTimeout(typeChar, randomTypingDelay());
  }

  typeChar();
}

function appendWarningLine(el, text) {
  const currentText = el.textContent.replace(/_+$/,"");
  el.innerHTML = "";

  const firstTextNode = document.createTextNode(currentText + "\n");
  const secondTextNode = document.createTextNode("");
  const warningCursor = document.createElement("span");
  warningCursor.className = "cursor";
  warningCursor.textContent = "_";

  el.appendChild(firstTextNode);
  el.appendChild(secondTextNode);
  el.appendChild(warningCursor);

  let i = 0;

  function typeChar() {
    if (i >= text.length) return;
    secondTextNode.textContent += text.charAt(i);
    i++;
    setTimeout(typeChar, randomTypingDelay());
  }

  typeChar();
}

function randomTypingDelay() {
  const delays = [55, 68, 74, 82, 96, 110, 128, 145, 88, 102];
  return delays[Math.floor(Math.random() * delays.length)];
}

typeNext();
</script>
