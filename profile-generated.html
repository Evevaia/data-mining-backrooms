<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacked Terminal Physics</title>
<style>
body{
  background:#050505;
  color:#e8e8e8;
  font-family:"Lucida Console","Courier New",monospace;
  margin:0;
  padding:24px;
  min-height:100vh;
  overflow:hidden;
}
.screen{
  max-width:900px;
  margin:0 auto;
  font-size:18px;
  line-height:1.45;
  white-space:pre-wrap;
  position:relative;
}
.line{
  display:block;
  min-height:1.4em;
  position:relative;
}
.bar-wrap{
  width:100%;
  height:8px;
  border:1px solid #2b2b30;
  background:#101013;
  overflow:hidden;
  margin-top:4px;
}
.bar-fill{
  height:100%;
  width:0;
  background:#4caf50;
  transition:width 1s linear;
}
.bar-fill.show-1{width:84%;}
.bar-fill.show-2{width:22%;}
.bar-fill.show-3{width:76%;}
.bar-fill.show-4{width:91%;}
.bar-fill.show-5{width:68%;}
.cursor{
  display:inline-block;
  animation:blink 1s steps(1) infinite;
}
@keyframes blink{50%{opacity:0;}}
.fall{
  position:absolute;
  display:inline-block;
  left:0;
  top:0;
  transition: transform 2s cubic-bezier(0.22, 1, 0.36, 1);
}
</style>
</head>
<body>

<div class="screen" id="screen"></div>

<script>
const screen = document.getElementById("screen");
const cursor = document.createElement("span");
cursor.className="cursor"; cursor.textContent="_";

const lines = [
  "MICROPHONE: ACTIVE",
  "CAMERA: ACTIVE",
  "VOICEPRINT: MATCHED",
  "AMBIENT AUDIO: CAPTURED",
  "BACKGROUND MOVEMENT: DETECTED"
];

let lineEls = [];
let fallElements = [];

function createLine(text){
  const div = document.createElement("div");
  div.className="line";
  div.textContent = text;
  screen.appendChild(div);
  lineEls.push(div);
}

function createBar(percent, idx){
  const wrap = document.createElement("div");
  wrap.className="bar-wrap";
  const fill = document.createElement("div");
  fill.className="bar-fill show-" + idx;
  wrap.appendChild(fill);
  screen.appendChild(wrap);
  lineEls.push(wrap);
}

// Create initial lines and bars
lines.forEach((l)=>createLine(l));
createBar(84,1);
createBar(22,2);
createBar(76,3);
createBar(91,4);
createBar(68,5);

// After a brief pause, start falling animation
setTimeout(()=>fallLines(),500);

function fallLines(){
  lineEls.forEach(el=>{
    const rect = el.getBoundingClientRect();
    const clone = el.cloneNode(true);
    clone.style.position="absolute";
    clone.style.left=rect.left + "px";
    clone.style.top=rect.top + "px";
    clone.style.width=rect.width+"px";
    clone.style.transformOrigin="center top";
    clone.classList.add("fall");
    document.body.appendChild(clone);
    fallElements.push(clone);
    el.style.visibility="hidden";
  });

  // Animate fall with random rotation
  fallElements.forEach(el=>{
    const maxX = Math.random()*200 - 100;
    const maxY = window.innerHeight - el.getBoundingClientRect().top - 50;
    const rot = (Math.random()-0.5)*60;
    setTimeout(()=>{
      el.style.transform=`translate(${maxX}px, ${maxY}px) rotate(${rot}deg)`;
    },50);
  });

  // After fall, show GET OUT message
  setTimeout(()=>showGetOut(),2500);
}

function showGetOut(){
  const msg = document.createElement("div");
  msg.className="line";
  msg.style.position="absolute";
  msg.style.top="20px";
  msg.style.left="50%";
  msg.style.transform="translateX(-50%)";
  screen.appendChild(msg);
  const getOut = "GET OUT!";
  let idx=0;
  const getCursor = document.createElement("span");
  getCursor.className="cursor";
  getCursor.textContent="_";
  msg.appendChild(getCursor);

  function typeChar(){
    if(idx<getOut.length){
      msg.insertBefore(document.createTextNode(getOut.charAt(idx)),getCursor);
      idx++;
      setTimeout(typeChar,50+Math.random()*150);
    } else {
      setTimeout(()=>typeNow(),1500);
    }
  }
  typeChar();
}

function typeNow(){
  const msg = document.createElement("div");
  msg.className="line";
  msg.style.position="absolute";
  msg.style.top="60px";
  msg.style.left="50%";
  msg.style.transform="translateX(-50%)";
  screen.appendChild(msg);
  const nowText="NOW!";
  let idx=0;
  const nowCursor = document.createElement("span");
  nowCursor.className="cursor";
  nowCursor.textContent="_";
  msg.appendChild(nowCursor);

  function typeChar(){
    if(idx<nowText.length){
      msg.insertBefore(document.createTextNode(nowText.charAt(idx)),nowCursor);
      idx++;
      setTimeout(typeChar,50+Math.random()*150);
    }
  }
  typeChar();
}

// Optional: Add slight motion on device tilt
if(window.DeviceOrientationEvent){
  window.addEventListener("deviceorientation", function(event){
    const gamma = event.gamma || 0;
    const beta = event.beta || 0;
    fallElements.forEach(el=>{
      el.style.transform += ` translateX(${gamma*0.5}px) translateY(${beta*0.3}px)`;
    });
  });
}
</script>

</body>
</html>
