<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Generated</title>

<style>
body{
background:#050505;
color:#e8e8e8;
font-family:"Lucida Console","Courier New",monospace;
margin:0;
padding:40px;
min-height:100vh;
}

.screen{
max-width:900px;
margin:0 auto;
font-size:24px;
line-height:1.6;
white-space:pre-wrap;
}

.line{
display:block;
}

.cursor{
display:inline-block;
width:auto;
animation:blink 1s steps(1) infinite;
}

.results{
margin-top:0;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}
</style>
</head>
<body>

<div class="screen" id="screen"></div>

<script>
const screen = document.getElementById("screen");

const lines = [
  "RUNNING BEHAVIORAL ANALYSIS:",
  "INTERPRETING USER RESPONSE:",
  "GENERATING PROFILE:",
  "",
  "CURIOSITY INDEX: HIGH",
  "WARNING RESISTANCE: LOW",
  "SYMBOLIC TRUST: DETECTED",
  "PERSONALIZATION RESPONSE: POSITIVE",
  "ADAPTIVE TARGETING: ENABLED",
  "PROFILE STATUS: GENERATED"
];

let currentLine = 0;
let currentChar = 0;
let currentLineElement = null;
let cursor = null;

function createNewLine() {
  currentLineElement = document.createElement("div");
  currentLineElement.className = "line";
  screen.appendChild(currentLineElement);

  cursor = document.createElement("span");
  cursor.className = "cursor";
  cursor.textContent = "_";
  currentLineElement.appendChild(cursor);
}

function moveCursorAfterText() {
  if (cursor && currentLineElement) {
    currentLineElement.appendChild(cursor);
  }
}

function typeNextCharacter() {
  if (currentLine >= lines.length) {
    if (cursor) cursor.remove();
    return;
  }

  const text = lines[currentLine];

  if (!currentLineElement) {
    createNewLine();
  }

  if (currentChar < text.length) {
    const charNode = document.createTextNode(text.charAt(currentChar));
    currentLineElement.insertBefore(charNode, cursor);
    currentChar++;
    moveCursorAfterText();
    setTimeout(typeNextCharacter, 45);
  } else {
    currentChar = 0;
    currentLine++;
    currentLineElement = null;

    if (currentLine === 4) {
      flickerPause(0);
    } else {
      setTimeout(typeNextCharacter, 250);
    }
  }
}

function flickerPause(count) {
  if (count < 6) {
    cursor.style.opacity = cursor.style.opacity === "0" ? "1" : "0";
    setTimeout(function() {
      flickerPause(count + 1);
    }, 120);
  } else {
    cursor.style.opacity = "1";
    currentLineElement = null;
    setTimeout(typeNextCharacter, 250);
  }
}

typeNextCharacter();
</script>

</body>
</html>
