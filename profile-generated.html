<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Generated</title>

<style>
body{
background:#050505;
color:#e8e8e8;
font-family:"Lucida Console","Courier New",monospace;
margin:0;
padding:40px;
min-height:100vh;
}

.screen{
max-width:900px;
margin:0 auto;
font-size:19px;
line-height:1.7;
white-space:pre-wrap;
}

.line{
display:block;
min-height:1.7em;
}

.cursor{
display:inline;
animation:blink 1s steps(1) infinite;
}

.analysis-panel{
display:none;
margin-top:28px;
border:1px solid #2a2a2a;
padding:18px;
background:#0a0a0a;
}

.analysis-panel.show{
display:block;
}

.panel-title{
font-size:16px;
letter-spacing:0.08em;
color:#9d9d9d;
margin-bottom:16px;
text-transform:uppercase;
}

.metric{
margin-bottom:14px;
}

.metric-label{
font-size:15px;
margin-bottom:6px;
color:#cfcfcf;
}

.bar-wrap{
width:100%;
height:12px;
border:1px solid #2c2c2c;
background:#090909;
overflow:hidden;
}

.bar-fill{
height:100%;
width:0;
background:#d8d8d8;
transition:width 1.2s ease;
}

.bar-fill.show-1{width:84%;}
.bar-fill.show-2{width:22%;}
.bar-fill.show-3{width:76%;}
.bar-fill.show-4{width:91%;}
.bar-fill.show-5{width:68%;}

.small-note{
margin-top:12px;
font-size:14px;
color:#8e8e8e;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

@media (max-width:700px){
body{
padding:24px;
}

.screen{
font-size:16px;
line-height:1.65;
}

.line{
min-height:1.65em;
}

.metric-label{
font-size:13px;
}

.panel-title{
font-size:14px;
}
}
</style>
</head>
<body>

<div class="screen" id="screen"></div>

<script>
const screen = document.getElementById("screen");

const lines = [
  "RUNNING BEHAVIORAL ANALYSIS...",
  "INTERPRETING USER RESPONSE...",
  "GENERATING PROFILE...",
  "",
  "CURIOSITY INDEX: HIGH",
  "WARNING RESISTANCE: LOW",
  "SYMBOLIC TRUST: DETECTED",
  "PERSONALIZATION RESPONSE: POSITIVE",
  "ADAPTIVE TARGETING: ENABLED",
  "PROFILE STATUS: GENERATED"
];

const finalWarning = "DON'T LOOK. GET OUT!";
const finalUrgency = "NOW!";

let currentLineIndex = 0;
let currentCharIndex = 0;
let currentLineEl = null;

let finalCharIndex = 0;
let finalLineEl = null;

let urgencyCharIndex = 0;
let urgencyLineEl = null;

const cursor = document.createElement("span");
cursor.className = "cursor";
cursor.textContent = "_";

function startLine() {
  currentLineEl = document.createElement("div");
  currentLineEl.className = "line";
  screen.appendChild(currentLineEl);
  currentLineEl.appendChild(cursor);
}

function typeNext() {
  if (currentLineIndex >= lines.length) {
    showAnalysisPanel();
    return;
  }

  if (!currentLineEl) {
    startLine();
  }

  const lineText = lines[currentLineIndex];

  if (currentCharIndex < lineText.length) {
    const textNode = document.createTextNode(lineText.charAt(currentCharIndex));
    currentLineEl.insertBefore(textNode, cursor);
    currentCharIndex++;
    setTimeout(typeNext, 95);
    return;
  }

  if (currentLineIndex === 0 || currentLineIndex === 1 || currentLineIndex === 2) {
    setTimeout(() => {
      currentLineIndex++;
      currentCharIndex = 0;
      currentLineEl = null;
      typeNext();
    }, 2200);
    return;
  }

  if (lineText === "" && currentLineIndex === 3) {
    flickerPause(0);
    return;
  }

  currentLineIndex++;
  currentCharIndex = 0;
  currentLineEl = null;
  setTimeout(typeNext, 320);
}

function flickerPause(count) {
  if (count < 12) {
    cursor.style.opacity = cursor.style.opacity === "0" ? "1" : "0";
    setTimeout(() => flickerPause(count + 1), 180);
  } else {
    cursor.style.opacity = "1";
    currentLineIndex++;
    currentCharIndex = 0;
    currentLineEl = null;
    setTimeout(typeNext, 320);
  }
}

function showAnalysisPanel() {
  const panel = document.createElement("div");
  panel.className = "analysis-panel";
  panel.innerHTML = `
    <div class="panel-title">Predictive Personality Analysis</div>

    <div class="metric">
      <div class="metric-label">CURIOSITY RESPONSE</div>
      <div class="bar-wrap"><div class="bar-fill" id="bar1"></div></div>
    </div>

    <div class="metric">
      <div class="metric-label">WARNING COMPLIANCE</div>
      <div class="bar-wrap"><div class="bar-fill" id="bar2"></div></div>
    </div>

    <div class="metric">
      <div class="metric-label">SYMBOLIC TRUST</div>
      <div class="bar-wrap"><div class="bar-fill" id="bar3"></div></div>
    </div>

    <div class="metric">
      <div class="metric-label">TARGETING SUSCEPTIBILITY</div>
      <div class="bar-wrap"><div class="bar-fill" id="bar4"></div></div>
    </div>

    <div class="metric">
      <div class="metric-label">PREDICTION STABILITY</div>
      <div class="bar-wrap"><div class="bar-fill" id="bar5"></div></div>
    </div>

    <div class="small-note">Profile confidence score accepted.</div>
  `;
  screen.appendChild(panel);

  setTimeout(() => {
    panel.classList.add("show");
    document.getElementById("bar1").classList.add("show-1");
    document.getElementById("bar2").classList.add("show-2");
    document.getElementById("bar3").classList.add("show-3");
    document.getElementById("bar4").classList.add("show-4");
    document.getElementById("bar5").classList.add("show-5");
  }, 250);

  setTimeout(() => {
    clearAndStartFinalWarning();
  }, 2600);
}

function clearAndStartFinalWarning() {
  screen.innerHTML = "";
  setTimeout(() => {
    finalLineEl = document.createElement("div");
    finalLineEl.className = "line";
    screen.appendChild(finalLineEl);
    finalLineEl.appendChild(cursor);
    typeFinalWarning();
  }, 1800);
}

function typeFinalWarning() {
  if (finalCharIndex < finalWarning.length) {
    const textNode = document.createTextNode(finalWarning.charAt(finalCharIndex));
    finalLineEl.insertBefore(textNode, cursor);
    finalCharIndex++;
    setTimeout(typeFinalWarning, 135);
  } else {
    setTimeout(() => {
      typeUrgencyAfterDelay();
    }, 10000);
  }
}

function typeUrgencyAfterDelay() {
  urgencyLineEl = document.createElement("div");
  urgencyLineEl.className = "line";
  screen.appendChild(urgencyLineEl);
  urgencyLineEl.appendChild(cursor);
  typeUrgency();
}

function typeUrgency() {
  if (urgencyCharIndex < finalUrgency.length) {
    const textNode = document.createTextNode(finalUrgency.charAt(urgencyCharIndex));
    urgencyLineEl.insertBefore(textNode, cursor);
    urgencyCharIndex++;
    setTimeout(typeUrgency, 170);
  }
}

typeNext();
</script>

</body>
</html>
