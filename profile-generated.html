<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profiling</title>
<style>
body{
  background:#050505;
  color:#e8e8e8;
  font-family:"Courier New", monospace;
  margin:0;
  padding:40px;
  min-height:100vh;
  overflow:hidden;
}
.screen{
  max-width:900px;
  margin:0 auto;
  font-size:19px;
  line-height:1.45;
  white-space:pre-wrap;
}
.line{
  display:block;
  min-height:1.45em;
}
.cursor{
  display:inline;
  animation:blink 1s steps(1) infinite;
}
.analysis-panel{
  display:block;
  margin-top:8px;
  border:1px solid #111;
  padding:10px 12px;
  background:#0a0a0a;
  max-width:420px;
  font-family:"Courier New", monospace;
}
.panel-title{
  font-size:13px;
  letter-spacing:0.06em;
  color:#7efc7e;
  margin:0 0 8px 0;
  text-transform:uppercase;
  line-height:1.1;
}
.metric-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin:0 0 3px 0;
  font-size:12px;
  color:#8e8e8e;
}
.bar-wrap{
  width:100%;
  height:6px;
  border:1px solid #111;
  background:#000;
  overflow:hidden;
}
.bar-fill{
  height:100%;
  width:0;
  background:#7efc7e;
  transition:width 1s linear;
}
.bar-fill.show-1{width:84%;}
.bar-fill.show-2{width:22%;}
.bar-fill.show-3{width:76%;}
.bar-fill.show-4{width:91%;}
.bar-fill.show-5{width:68%;}
@keyframes blink{50%{opacity:0;}}
</style>
</head>
<body>

<div class="screen" id="screen"></div>

<script>
const screen = document.getElementById("screen");
const cursor = document.createElement("span");
cursor.className="cursor"; cursor.textContent="_";

const lines=[
  "RUNNING BEHAVIORAL ANALYSIS...",
  "INTERPRETING USER RESPONSE...",
  "GENERATING PROFILE..."
];

const finalWarning="GET OUT!";
const finalUrgency="NOW!";
let currentLineIndex=0;
let currentCharIndex=0;
let currentLineEl=null;
let finalCharIndex=0;
let finalLineEl=null;
let urgencyCharIndex=0;
let urgencyLineEl=null;

// helper για τυχαία γράμματα
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()[]{}<>?/|\\~";
function randomChar(){ return chars.charAt(Math.floor(Math.random()*chars.length)); }

function startLine(){
  currentLineEl=document.createElement("div");
  currentLineEl.className="line";
  screen.appendChild(currentLineEl);
  currentLineEl.appendChild(cursor);
}

function typeNext(){
  if(currentLineIndex>=lines.length){showStats(); return;}
  if(!currentLineEl) startLine();
  const text=lines[currentLineIndex];
  if(currentCharIndex<text.length){
    currentLineEl.insertBefore(document.createTextNode(text.charAt(currentCharIndex)),cursor);
    currentCharIndex++;
    setTimeout(typeNext,95); return;
  }
  setTimeout(()=>{
    currentLineIndex++;
    currentCharIndex=0;
    currentLineEl=null;
    typeNext();
  },800);
}

function showStats(){
  const panel=document.createElement("div");
  panel.className="analysis-panel";
  panel.innerHTML=`
    <div class="panel-title">Predictive Personality Analysis</div>
    <div class="metric-row">CURIOSITY RESPONSE <span class="bar-fill show-1"></span></div>
    <div class="metric-row">WARNING COMPLIANCE <span class="bar-fill show-2"></span></div>
    <div class="metric-row">SYMBOLIC TRUST <span class="bar-fill show-3"></span></div>
    <div class="metric-row">TARGETING SUSCEPTIBILITY <span class="bar-fill show-4"></span></div>
    <div class="metric-row">PREDICTION STABILITY <span class="bar-fill show-5"></span></div>
  `;
  screen.appendChild(panel);

  // άμεσο glitch/hack effect
  setTimeout(dramaticHackEffect,1000);
}

function dramaticHackEffect(){
  let steps=0;
  const elems=screen.querySelectorAll(".analysis-panel, .bar-fill, .metric-row");
  const interval=setInterval(()=>{
    elems.forEach(el=>{
      if(el.childNodes.length>0){
        el.childNodes.forEach(c=>{
          if(c.nodeType===3){ // text node
            c.textContent=c.textContent.split("").map(ch=>Math.random()<0.4?randomChar():ch).join("");
          }
        });
      }
    });
    steps++;
    if(steps>25){
      clearInterval(interval);
      setTimeout(()=>collapseScreen(),200);
    }
  },60);
}

function collapseScreen(){
  document.body.style.transition="background 0.2s";
  document.body.style.background="#000";
  screen.style.transition="all 0.6s ease";
  screen.style.transform="translateY(200px) rotate(5deg) scale(0.3)";
  screen.style.opacity="0";
  // 1.7 δευτ pause πριν GET OUT
  setTimeout(()=>startGetOut(),1700);
}

function startGetOut(){
  screen.innerHTML="";
  screen.style.transform="";
  screen.style.opacity="1";
  screen.style.background="#000";
  finalLineEl=document.createElement("div");
  finalLineEl.className="line";
  screen.appendChild(finalLineEl);
  finalLineEl.appendChild(cursor);
  typeFinalWarning();
}

function typeFinalWarning(){
  if(finalCharIndex<finalWarning.length){
    finalLineEl.insertBefore(document.createTextNode(finalWarning.charAt(finalCharIndex)),cursor);
    finalCharIndex++;
    setTimeout(typeFinalWarning,50+Math.random()*180);
  } else {
    setTimeout(()=>{
      urgencyLineEl=document.createElement("div");
      urgencyLineEl.className="line";
      screen.appendChild(urgencyLineEl);
      urgencyLineEl.appendChild(cursor);
      typeUrgency();
    },3000);
  }
}

function typeUrgency(){
  if(urgencyCharIndex<finalUrgency.length){
    urgencyLineEl.insertBefore(document.createTextNode(finalUrgency.charAt(urgencyCharIndex)),cursor);
    urgencyCharIndex++;
    setTimeout(typeUrgency,80+Math.random()*120);
  }
}

typeNext();
</script>

</body>
</html>
