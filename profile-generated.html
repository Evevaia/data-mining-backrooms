<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacked Stats Drop</title>
<style>
body{
  background:#050505;
  color:#e8e8e8;
  font-family:"Lucida Console","Courier New",monospace;
  margin:0;
  padding:20px;
  overflow:hidden;
}
.screen{
  max-width:100%;
  font-size:12px;
  line-height:1.2;
  white-space:nowrap;
  position:relative;
  display:flex;
  flex-wrap:nowrap;
  overflow-x:hidden;
}
.line, .bar-wrap{
  display:inline-block;
  margin-right:6px;
  position:relative;
}
.bar-wrap{
  width:40px;
  height:6px;
  border:1px solid #2b2b30;
  background:#101013;
}
.bar-fill{
  height:100%;
  width:0;
  background:#4caf50;
  transition:width 0.8s linear;
}
.bar-fill.show-1{width:84%;}
.bar-fill.show-2{width:22%;}
.bar-fill.show-3{width:76%;}
.bar-fill.show-4{width:91%;}
.bar-fill.show-5{width:68%;}
.cursor{
  display:inline-block;
  animation:blink 1s steps(1) infinite;
}
@keyframes blink{50%{opacity:0;}}
.fall{
  position:absolute;
  display:inline-block;
  transition: transform 1.5s cubic-bezier(0.22, 1, 0.36, 1);
}
</style>
</head>
<body>

<div class="screen" id="screen"></div>

<script>
const screen = document.getElementById("screen");
const cursor = document.createElement("span");
cursor.className="cursor"; cursor.textContent="_";

const lines = [
  "MICROPHONE: ACTIVE",
  "CAMERA: ACTIVE",
  "VOICEPRINT: MATCHED",
  "AMBIENT AUDIO: CAPTURED",
  "BACKGROUND MOVEMENT: DETECTED"
];

let lineEls = [];
let fallElements = [];

// helper για glitch
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()[]{}<>?/|\\~";
function randomChar(){ return chars.charAt(Math.floor(Math.random()*chars.length)); }

// Δημιουργία lines
lines.forEach((text)=>{
  const div=document.createElement("div");
  div.className="line";
  div.textContent=text;
  screen.appendChild(div);
  lineEls.push(div);
});

// Δημιουργία bars
[1,2,3,4,5].forEach(idx=>{
  const wrap=document.createElement("div");
  wrap.className="bar-wrap";
  const fill=document.createElement("div");
  fill.className="bar-fill show-"+idx;
  wrap.appendChild(fill);
  screen.appendChild(wrap);
  lineEls.push(wrap);
});

// glitch effect
function glitchEffect(iter=0){
  if(iter>20){
    setTimeout(()=>fallLines(),300);
    return;
  }
  lineEls.forEach(el=>{
    if(el.nodeName==="DIV" && el.childNodes.length && el.firstChild.nodeType===3){
      let txt=el.textContent;
      txt=txt.split("").map(c=>Math.random()<0.3?randomChar():c).join("");
      el.textContent=txt;
    }
  });
  setTimeout(()=>glitchEffect(iter+1),80);
}

// fall effect (single row)
function fallLines(){
  const screenRect=screen.getBoundingClientRect();
  let leftOffset=screenRect.left+10;
  lineEls.forEach(el=>{
    const rect=el.getBoundingClientRect();
    const clone=el.cloneNode(true);
    clone.style.position="absolute";
    clone.style.left=leftOffset+"px";
    clone.style.top=rect.top+"px";
    clone.style.width=rect.width+"px";
    clone.classList.add("fall");
    document.body.appendChild(clone);
    fallElements.push(clone);
    el.style.visibility="hidden";
    leftOffset+=rect.width+6;
  });
  // animation
  fallElements.forEach(el=>{
    const maxY=window.innerHeight - 40;
    const rot=(Math.random()-0.5)*20;
    setTimeout(()=>el.style.transform=`translateY(${maxY}px) rotate(${rot}deg)`,50);
  });
  setTimeout(showGetOut,2000);
}

function showGetOut(){
  const msg = document.createElement("div");
  msg.className="line";
  msg.style.position="absolute";
  msg.style.top="20px";
  msg.style.left="50%";
  msg.style.transform="translateX(-50%)";
  screen.appendChild(msg);
  const getOut="GET OUT!";
  let idx=0;
  const getCursor=document.createElement("span");
  getCursor.className="cursor";
  getCursor.textContent="_";
  msg.appendChild(getCursor);

  function typeChar(){
    if(idx<getOut.length){
      msg.insertBefore(document.createTextNode(getOut.charAt(idx)),getCursor);
      idx++;
      setTimeout(typeChar,50+Math.random()*150);
    } else {
      setTimeout(typeNow,1500);
    }
  }
  typeChar();
}

function typeNow(){
  const msg = document.createElement("div");
  msg.className="line";
  msg.style.position="absolute";
  msg.style.top="60px";
  msg.style.left="50%";
  msg.style.transform="translateX(-50%)";
  screen.appendChild(msg);
  const nowText="NOW!";
  let idx=0;
  const nowCursor=document.createElement("span");
  nowCursor.className="cursor";
  nowCursor.textContent="_";
  msg.appendChild(nowCursor);

  function typeChar(){
    if(idx<nowText.length){
      msg.insertBefore(document.createTextNode(nowText.charAt(idx)),nowCursor);
      idx++;
      setTimeout(typeChar,80+Math.random()*120);
    }
  }
  typeChar();
}

// start
setTimeout(glitchEffect,500);
</script>

</body>
</html>
