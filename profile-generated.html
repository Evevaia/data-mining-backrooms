<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Crash Gravity</title>
<style>
body{
  background:#050505;
  color:#e8e8e8;
  font-family:"Lucida Console","Courier New",monospace;
  margin:0;
  padding:20px;
  overflow:hidden;
}
.screen{
  max-width:100%;
  font-size:14px;
  line-height:1.2;
  white-space:nowrap;
  position:relative;
  display:flex;
  flex-wrap:nowrap;
  overflow-x:hidden;
}
.line{
  display:inline-block;
  margin-right:6px;
  position:relative;
}
.bar-wrap{
  display:inline-block;
  width:40px;
  height:6px;
  border:1px solid #2b2b30;
  background:#101013;
  margin-right:6px;
  vertical-align:middle;
}
.bar-fill{
  height:100%;
  width:0;
  background:#4caf50;
  transition:width 0.8s linear;
}
.bar-fill.show-1{width:84%;}
.bar-fill.show-2{width:22%;}
.bar-fill.show-3{width:76%;}
.bar-fill.show-4{width:91%;}
.bar-fill.show-5{width:68%;}
.cursor{
  display:inline-block;
  animation:blink 1s steps(1) infinite;
}
@keyframes blink{50%{opacity:0;}}
.fall{
  position:absolute;
  display:inline-block;
  transition: transform 2s cubic-bezier(0.22,1,0.36,1);
  will-change: transform;
}
</style>
</head>
<body>

<div class="screen" id="screen"></div>

<script>
const screen=document.getElementById("screen");
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()[]{}<>?/|\\~";
function randomChar(){return chars.charAt(Math.floor(Math.random()*chars.length));}

const lines=[
  "RUNNING BEHAVIORAL ANALYSIS...",
  "INTERPRETING USER RESPONSE...",
  "GENERATING PROFILE..."
];

const stats=[
  {label:"CURIOSITY", value:"84%"},
  {label:"WARNING", value:"22%"},
  {label:"TRUST", value:"76%"},
  {label:"SUSCEPTIBILITY", value:"91%"},
  {label:"STABILITY", value:"68%"}
];

const finalWarning="GET OUT!";
const finalUrgency="NOW!";

let currentLineIndex=0;
let currentCharIndex=0;
let currentLineEl=null;
const cursor=document.createElement("span"); cursor.className="cursor"; cursor.textContent="_";

let fallElements=[];

// === Step 1: Display 3 lines ===
function startLine(){
  currentLineEl=document.createElement("div");
  currentLineEl.className="line";
  screen.appendChild(currentLineEl);
  currentLineEl.appendChild(cursor);
}
function typeNext(){
  if(currentLineIndex>=lines.length){showStats(); return;}
  if(!currentLineEl) startLine();
  const text=lines[currentLineIndex];
  if(currentCharIndex<text.length){
    currentLineEl.insertBefore(document.createTextNode(text.charAt(currentCharIndex)),cursor);
    currentCharIndex++;
    setTimeout(typeNext,95);
    return;
  }
  setTimeout(()=>{
    currentLineIndex++;
    currentCharIndex=0;
    currentLineEl=null;
    typeNext();
  },800);
}

// === Step 2: Show stats with bars ===
function showStats(){
  stats.forEach((s,i)=>{
    const div=document.createElement("div");
    div.className="line";
    div.textContent=`[${s.label}] ${s.value}`;
    screen.appendChild(div);
    fallElements.push(div);
    const barWrap=document.createElement("div");
    barWrap.className="bar-wrap";
    const barFill=document.createElement("div");
    barFill.className="bar-fill show-"+(i+1);
    barWrap.appendChild(barFill);
    screen.appendChild(barWrap);
    fallElements.push(barWrap);
  });
  setTimeout(hackEffect,100); // small delay before hack
}

// === Step 3: Glitch / hack effect for 2.5s ===
function hackEffect(){
  let steps=0;
  const hackInterval=setInterval(()=>{
    fallElements.forEach(el=>{
      if(el.firstChild && el.firstChild.nodeType===3){
        let txt=el.textContent;
        txt=txt.split("").map(c=>Math.random()<0.3?randomChar():c).join("");
        el.textContent=txt;
      } else if(el.classList.contains("bar-wrap")){
        const fill=el.firstChild;
        fill.style.width=(Math.random()*100)+"%";
      }
    });
    steps++;
    if(steps>50){ // ~2.5s
      clearInterval(hackInterval);
      startFall();
    }
  },50);
}

// === Step 4: Gravity fall within viewport ===
function startFall(){
  const screenRect=screen.getBoundingClientRect();
  let leftOffset=screenRect.left+10;
  fallElements.forEach(el=>{
    const rect=el.getBoundingClientRect();
    const clone=el.cloneNode(true);
    clone.style.position="absolute";
    clone.style.left=leftOffset+"px";
    clone.style.top=rect.top+"px";
    clone.style.width=rect.width+"px";
    clone.classList.add("fall");
    document.body.appendChild(clone);
    el.style.visibility="hidden";
    leftOffset+=rect.width+6;
  });
  // animate fall
  fallElements.forEach(el=>{
    const maxY=window.innerHeight - 50;
    const rot=(Math.random()-0.5)*20;
    setTimeout(()=>el.style.transform=`translateY(${maxY}px) rotate(${rot}deg)`,50);
  });
  // after fall, show GET OUT
  setTimeout(showGetOut,2500);
}

// === Step 5: GET OUT / NOW typing ===
function showGetOut(){
  const msg=document.createElement("div");
  msg.className="line";
  msg.style.position="absolute";
  msg.style.top="20px";
  msg.style.left="50%";
  msg.style.transform="translateX(-50%)";
  screen.appendChild(msg);
  let idx=0;
  const getCursor=document.createElement("span"); getCursor.className="cursor"; getCursor.textContent="_";
  msg.appendChild(getCursor);

  function typeChar(){
    if(idx<finalWarning.length){
      msg.insertBefore(document.createTextNode(finalWarning.charAt(idx)),getCursor);
      idx++;
      setTimeout(typeChar,50+Math.random()*150);
    } else {
      setTimeout(typeNow,3000);
    }
  }
  typeChar();
}

function typeNow(){
  const msg=document.createElement("div");
  msg.className="line";
  msg.style.position="absolute";
  msg.style.top="60px";
  msg.style.left="50%";
  msg.style.transform="translateX(-50%)";
  screen.appendChild(msg);
  let idx=0;
  const nowCursor=document.createElement("span"); nowCursor.className="cursor"; nowCursor.textContent="_";
  msg.appendChild(nowCursor);

  function typeChar(){
    if(idx<finalUrgency.length){
      msg.insertBefore(document.createTextNode(finalUrgency.charAt(idx)),nowCursor);
      idx++;
      setTimeout(typeChar,80+Math.random()*120);
    }
  }
  typeChar();
}

// === Step 6: Motion effect on mobile tilt ===
if(window.DeviceOrientationEvent){
  window.addEventListener("deviceorientation", e=>{
    const gamma=e.gamma||0;
    const beta=e.beta||0;
    fallElements.forEach(el=>{
      el.style.transform += ` translateX(${gamma*0.3}px) translateY(${beta*0.3}px)`;
    });
  });
}

// start typing
typeNext();
</script>
</body>
</html>
