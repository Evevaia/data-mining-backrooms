<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Generated</title>

<style>
body{
background:#050505;
color:#e8e8e8;
font-family:"Lucida Console","Courier New",monospace;
margin:0;
padding:28px 18px;
min-height:100vh;
overflow:hidden;
}

.screen{
max-width:900px;
margin:0 auto;
font-size:20px;
line-height:1.5;
white-space:pre-wrap;
position:relative;
z-index:2;
font-family:"Lucida Console","Courier New",monospace;
transform-origin:center center;
}

.line{
display:block;
min-height:1.5em;
position:relative;
font-family:"Lucida Console","Courier New",monospace;
}

.cursor{
display:inline;
animation:blink 1s steps(1) infinite;
font-family:"Lucida Console","Courier New",monospace;
}

.stats-wrap{
margin-top:4px;
display:flex;
flex-direction:column;
gap:5px;
font-family:"Lucida Console","Courier New",monospace;
}

.stat-row{
display:grid;
grid-template-columns:245px 1fr 60px;
align-items:center;
column-gap:10px;
font-size:15px;
line-height:1.15;
min-height:24px;
position:relative;
font-family:"Lucida Console","Courier New",monospace;
}

.stat-label,
.stat-value{
font-family:"Lucida Console","Courier New",monospace;
}

.stat-label{
white-space:nowrap;
}

.stat-bar{
height:9px;
border:1px solid #2a2a2a;
background:#0f0f0f;
position:relative;
overflow:hidden;
}

.stat-fill{
height:100%;
width:0%;
background:#e8e8e8;
transition:width 0.28s ease;
}

.stat-value{
text-align:right;
}

.big-warning{
position:fixed;
left:50%;
top:40%;
transform:translate(-50%,-50%);
font-size:54px;
line-height:1.08;
letter-spacing:3px;
text-align:center;
opacity:0;
pointer-events:none;
z-index:20;
color:#f2f2f2;
text-shadow:0 0 12px rgba(255,255,255,0.15);
white-space:pre-line;
font-family:"Lucida Console";
}

.big-warning.show{
opacity:1;
}

.flash{
position:fixed;
inset:0;
background:rgba(255,255,255,0.09);
opacity:0;
pointer-events:none;
z-index:12;
}

.flash.show{
animation:flashBang 620ms ease-out forwards;
}

.fragment{
position:fixed;
pointer-events:none;
z-index:15;
background:#e8e8e8;
opacity:1;
will-change:transform,left,top,opacity;
}

.tremble{
animation:screenTremble 0.08s linear infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

@keyframes flashBang{
0%{opacity:0;}
18%{opacity:1;}
100%{opacity:0;}
}

@keyframes screenTremble{
0%{transform:translate(0px,0px) rotate(0deg);}
20%{transform:translate(-2px,1px) rotate(-0.3deg);}
40%{transform:translate(3px,-2px) rotate(0.35deg);}
60%{transform:translate(-3px,2px) rotate(-0.35deg);}
80%{transform:translate(2px,-1px) rotate(0.25deg);}
100%{transform:translate(0px,0px) rotate(0deg);}
}

@media (max-width:900px){
body{
padding:18px 14px;
}
.screen{
font-size:15px;
line-height:1.4;
}
.line{
min-height:1.4em;
}
.stat-row{
grid-template-columns:1fr;
row-gap:3px;
min-height:auto;
font-size:12px;
margin-bottom:3px;
}
.stat-bar{
height:8px;
}
.stat-value{
text-align:left;
}
.big-warning{
top:38%;
font-size:34px;
letter-spacing:2px;
line-height:1.12;
font-family:"Lucida Console";
}
}
</style>
</head>
<body>

<div class="screen" id="screen"></div>
<div class="flash" id="flash"></div>
<div class="big-warning" id="getOut"></div>

<script>
const screen = document.getElementById("screen");
const flash = document.getElementById("flash");
const getOut = document.getElementById("getOut");

const introLines = [
  "RUNNING BEHAVIORAL ANALYSIS...",
  "INTERPRETING USER RESPONSE...",
  "GENERATING PROFILE...",
  ""
];

const stats = [
  { label: "CURIOSITY INDEX", value: 92 },
  { label: "WARNING RESISTANCE", value: 14 },
  { label: "SYMBOLIC TRUST", value: 81 },
  { label: "PERSONALIZATION RESPONSE", value: 88 },
  { label: "ADAPTIVE TARGETING", value: 97 },
  { label: "PROFILE STATUS", value: 100, textValue: "GENERATED" }
];

let currentLineIndex = 0;
let currentCharIndex = 0;
let currentLineEl = null;
let statsWrap = null;
let scrambleInterval = null;
let barInterval = null;
let physicsRunning = false;
let trembleInterval = null;

const cursor = document.createElement("span");
cursor.className = "cursor";
cursor.textContent = "_";

function startLine() {
  currentLineEl = document.createElement("div");
  currentLineEl.className = "line particle-target";
  screen.appendChild(currentLineEl);
  currentLineEl.appendChild(cursor);
}

function typeNext() {
  if (currentLineIndex >= introLines.length) {
    revealStats();
    return;
  }

  if (!currentLineEl) {
    startLine();
  }

  const lineText = introLines[currentLineIndex];

  if (currentCharIndex < lineText.length) {
    const textNode = document.createTextNode(lineText.charAt(currentCharIndex));
    currentLineEl.insertBefore(textNode, cursor);
    currentCharIndex++;
    setTimeout(typeNext, 78);
    return;
  }

  if (currentLineIndex === 0 || currentLineIndex === 1 || currentLineIndex === 2) {
    setTimeout(() => {
      currentLineIndex++;
      currentCharIndex = 0;
      currentLineEl = null;
      typeNext();
    }, 2200);
    return;
  }

  if (lineText === "" && currentLineIndex === 3) {
    flickerPause(0);
    return;
  }

  currentLineIndex++;
  currentCharIndex = 0;
  currentLineEl = null;
  setTimeout(typeNext, 220);
}

function flickerPause(count) {
  if (count < 12) {
    cursor.style.opacity = cursor.style.opacity === "0" ? "1" : "0";
    setTimeout(() => flickerPause(count + 1), 120);
  } else {
    cursor.style.opacity = "1";
    currentLineIndex++;
    currentCharIndex = 0;
    currentLineEl = null;
    setTimeout(typeNext, 220);
  }
}

function revealStats() {
  if (cursor.parentNode) {
    cursor.parentNode.removeChild(cursor);
  }

  statsWrap = document.createElement("div");
  statsWrap.className = "stats-wrap particle-target";
  screen.appendChild(statsWrap);

  let i = 0;
  function addNextStat() {
    if (i >= stats.length) {
      setTimeout(startHackPhase, 220);
      return;
    }

    const stat = stats[i];
    const row = document.createElement("div");
    row.className = "stat-row particle-target";
    row.dataset.baseLabel = stat.label;
    row.dataset.baseValue = String(stat.value);

    const label = document.createElement("div");
    label.className = "stat-label";
    label.textContent = stat.label + ":";

    const bar = document.createElement("div");
    bar.className = "stat-bar";

    const fill = document.createElement("div");
    fill.className = "stat-fill";
    fill.dataset.baseWidth = String(stat.value);
    bar.appendChild(fill);

    const value = document.createElement("div");
    value.className = "stat-value";
    value.textContent = stat.textValue ? stat.textValue : stat.value + "%";
    value.dataset.mode = stat.textValue ? "text" : "percent";
    value.dataset.baseText = stat.textValue ? stat.textValue : stat.value + "%";

    row.appendChild(label);
    row.appendChild(bar);
    row.appendChild(value);
    statsWrap.appendChild(row);

    requestAnimationFrame(() => {
      fill.style.width = stat.value + "%";
    });

    i++;
    setTimeout(addNextStat, 120);
  }

  addNextStat();
}

function startHackPhase() {
  const labels = Array.from(document.querySelectorAll(".stat-label"));
  const values = Array.from(document.querySelectorAll(".stat-value"));
  const fills = Array.from(document.querySelectorAll(".stat-fill"));
  const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#$%&@!?/\\\\[]{}<>*";

  scrambleInterval = setInterval(() => {
    labels.forEach((el) => {
      const base = el.parentElement.dataset.baseLabel + ":";
      el.textContent = scrambleText(base, charset, 0.7);
    });

    values.forEach((el) => {
      const mode = el.dataset.mode;
      if (mode === "percent") {
        const n = Math.floor(Math.random() * 100);
        el.textContent = scrambleText(String(n) + "%", charset, 0.52);
      } else {
        el.textContent = scrambleText("GENERATED", charset, 0.62);
      }
    });
  }, 65);

  barInterval = setInterval(() => {
    fills.forEach((fill) => {
      const base = Number(fill.dataset.baseWidth || 50);
      let jitter = base + Math.floor((Math.random() - 0.5) * 76);
      jitter = Math.max(2, Math.min(100, jitter));
      fill.style.width = jitter + "%";
    });
  }, 75);

  setTimeout(() => {
    startTremblePhase();
  }, 2200);

  setTimeout(() => {
    clearInterval(scrambleInterval);
    clearInterval(barInterval);
    stopTremblePhase();
    explodeScreen();
  }, 3000);
}

function startTremblePhase() {
  screen.classList.add("tremble");

  const targets = Array.from(document.querySelectorAll(".particle-target"));
  trembleInterval = setInterval(() => {
    targets.forEach((el) => {
      const tx = (Math.random() - 0.5) * 10;
      const ty = (Math.random() - 0.5) * 10;
      const rot = (Math.random() - 0.5) * 2.2;
      el.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
    });
  }, 45);
}

function stopTremblePhase() {
  screen.classList.remove("tremble");
  if (trembleInterval) {
    clearInterval(trembleInterval);
    trembleInterval = null;
  }
  const targets = Array.from(document.querySelectorAll(".particle-target"));
  targets.forEach((el) => {
    el.style.transform = "";
  });
}

function scrambleText(text, chars, intensity) {
  let out = "";
  for (let i = 0; i < text.length; i++) {
    if (text[i] === " ") {
      out += " ";
      continue;
    }
    if (Math.random() < intensity) {
      out += chars[Math.floor(Math.random() * chars.length)];
    } else {
      out += text[i];
    }
  }
  return out;
}

function explodeScreen() {
  flash.classList.add("show");

  const targets = Array.from(document.querySelectorAll(".particle-target")).filter(el => {
    const r = el.getBoundingClientRect();
    return r.width > 0 && r.height > 0;
  });

  const pieces = [];

  targets.forEach((el) => {
    const rect = el.getBoundingClientRect();
    const cols = Math.max(7, Math.min(22, Math.floor(rect.width / 28)));
    const rows = Math.max(3, Math.min(10, Math.floor(rect.height / 13)));
    const pieceW = rect.width / cols;
    const pieceH = rect.height / rows;

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const frag = document.createElement("div");
        frag.className = "fragment";

        const w = Math.max(2, pieceW - 0.5);
        const h = Math.max(2, pieceH - 0.5);
        const x = rect.left + col * pieceW;
        const y = rect.top + row * pieceH;

        frag.style.left = x + "px";
        frag.style.top = y + "px";
        frag.style.width = w + "px";
        frag.style.height = h + "px";

        document.body.appendChild(frag);

        const vx = (Math.random() - 0.5) * 15;
        const vy = -Math.random() * 8 - 2.5;
        const spin = (Math.random() - 0.5) * 18;

        pieces.push({
          el: frag,
          x,
          y,
          w,
          h,
          vx,
          vy,
          rot: 0,
          spin
        });
      }
    }

    el.style.visibility = "hidden";
  });

  runPhysics(pieces);

  setTimeout(() => {
    typeBigWarning(getOut, "GET OUT.");
  }, 2000);

  setTimeout(() => {
    getOut.textContent += "\n";
    typeBigWarningAppend(getOut, "NOW!");
  }, 5000);
}

function runPhysics(pieces) {
  if (physicsRunning) return;
  physicsRunning = true;

  const gravity = 0.24;
  const bounce = 0.12;
  const friction = 0.995;
  const floorFriction = 0.972;
  const airDragY = 0.996;

  function frame() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    for (let i = 0; i < pieces.length; i++) {
      const p = pieces[i];
      if (!p.el) continue;

      p.vy += gravity;
      p.vx *= friction;
      p.vy *= airDragY;

      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.spin;
      p.spin *= 0.996;

      if (p.x <= 0) {
        p.x = 0;
        p.vx *= -bounce;
      }

      if (p.x + p.w >= vw) {
        p.x = vw - p.w;
        p.vx *= -bounce;
      }

      if (p.y <= 0) {
        p.y = 0;
        p.vy *= -bounce;
      }

      if (p.y + p.h >= vh) {
        p.y = vh - p.h;
        p.vy *= -bounce;
        p.vx *= floorFriction;
        if (Math.abs(p.vy) < 0.35) {
          p.vy = 0;
        }
      }

      p.el.style.left = p.x + "px";
      p.el.style.top = p.y + "px";
      p.el.style.transform = "rotate(" + p.rot + "deg)";
    }

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
}

function typeBigWarning(el, text) {
  el.textContent = "";
  el.classList.add("show");

  let i = 0;

  function typeChar() {
    if (i >= text.length) return;
    el.textContent += text.charAt(i);
    i++;
    setTimeout(typeChar, randomTypingDelay());
  }

  typeChar();
}

function typeBigWarningAppend(el, text) {
  let i = 0;

  function typeChar() {
    if (i >= text.length) return;
    el.textContent += text.charAt(i);
    i++;
    setTimeout(typeChar, randomTypingDelay());
  }

  typeChar();
}

function randomTypingDelay() {
  const delays = [55, 68, 74, 82, 96, 110, 128, 145, 88, 102];
  return delays[Math.floor(Math.random() * delays.length)];
}

typeNext();
</script>

</body>
</html>
