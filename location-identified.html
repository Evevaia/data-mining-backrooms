<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Identified</title>

<style>
body{
background:#0e0e10;
color:#f2f2f2;
font-family:Arial, Helvetica, sans-serif;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
margin:0;
padding:24px;
}

.container{
width:100%;
max-width:780px;
background:#151518;
border:1px solid #2b2b30;
padding:30px;
}

.small{
font-size:12px;
letter-spacing:1px;
color:#9a9aa3;
margin-bottom:10px;
}

h1{
margin:0 0 14px 0;
font-size:30px;
font-weight:700;
}

.status{
font-size:14px;
color:#9a9aa3;
margin-bottom:22px;
min-height:20px;
}

.data-box{
border:1px solid #2b2b30;
background:#101013;
padding:16px;
margin-bottom:18px;
}

.data-line{
font-size:14px;
line-height:1.8;
color:#d7d7dd;
word-break:break-word;
}

.label{
color:#9a9aa3;
display:inline-block;
min-width:120px;
}

.pending{
color:#9a9aa3;
font-weight:600;
letter-spacing:0.03em;
}

.active{
color:#6ea8ff;
font-weight:600;
letter-spacing:0.03em;
}

.hidden-info{
display:none;
}

.hidden-info.show{
display:block;
}

.map-wrap{
position:relative;
border:1px solid #2b2b30;
background:#101013;
padding:10px;
overflow:hidden;
animation:breathe 4.2s ease-in-out infinite;
min-height:360px;
display:flex;
align-items:center;
justify-content:center;
}

.loading-screen{
width:100%;
max-width:520px;
text-align:left;
padding:24px;
}

.loading-text{
font-size:14px;
color:#b8b8c2;
margin-bottom:14px;
}

.loading-bar{
width:100%;
height:10px;
border:1px solid #2b2b30;
background:#0b0b0d;
overflow:hidden;
}

.loading-fill{
width:0%;
height:100%;
background:#6ea8ff;
transition:width 4.2s linear;
}

.map-content{
display:none;
width:100%;
position:relative;
}

.map-content.show{
display:block;
}

.map-content img{
display:block;
width:100%;
height:auto;
}

.location-dot{
position:absolute;
width:16px;
height:16px;
background:#1a73e8;
border:3px solid #ffffff;
border-radius:50%;
box-shadow:0 0 0 2px rgba(26,115,232,0.25);
top:41%;
left:48%;
transform:translate(-50%,-50%);
z-index:3;
opacity:0;
}

.location-dot.show{
opacity:1;
transition:opacity 0.25s ease;
}

.location-dot::after{
content:"";
position:absolute;
top:50%;
left:50%;
width:34px;
height:34px;
background:rgba(26,115,232,0.22);
border-radius:50%;
transform:translate(-50%,-50%);
animation:pulse 2s ease-out infinite;
}

.note{
margin-top:14px;
font-size:12px;
color:#9a9aa3;
display:none;
justify-content:space-between;
gap:12px;
flex-wrap:wrap;
}

.note.show{
display:flex;
}

.note span{
display:inline-block;
}

.note .live{
color:#6ea8ff;
}

.typing-cursor{
display:inline-block;
animation:blink 1s steps(1) infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

@keyframes pulse{
0%{
transform:translate(-50%,-50%) scale(0.6);
opacity:0.9;
}
100%{
transform:translate(-50%,-50%) scale(1.8);
opacity:0;
}
}

@keyframes breathe{
0%{
box-shadow:0 0 0 rgba(26,115,232,0);
border-color:#2b2b30;
}
50%{
box-shadow:0 0 18px rgba(26,115,232,0.08);
border-color:#3a4d68;
}
100%{
box-shadow:0 0 0 rgba(26,115,232,0);
border-color:#2b2b30;
}
}

@media (max-width:600px){
.container{
padding:20px;
}

h1{
font-size:26px;
}

.label{
display:block;
min-width:auto;
margin-bottom:2px;
}

.location-dot{
width:14px;
height:14px;
border-width:2px;
}

.note.show{
display:block;
}

.note span{
display:block;
margin-bottom:6px;
}

.map-wrap{
min-height:260px;
}
}
</style>
</head>
<body>

<div class="container">

<div class="small">LOCATION INTERFACE</div>

<h1>Location Identified</h1>

<div class="status" id="statusText"><span class="pending">Status pending...</span></div>

<div class="data-box">
  <div class="data-line"><span class="label">STATUS</span> <span class="pending" id="statusValue">PENDING</span></div>

  <div id="hiddenInfo" class="hidden-info">
    <div class="data-line"><span class="label">LATITUDE</span> 37.9951914</div>
    <div class="data-line"><span class="label">LONGITUDE</span> 23.7329735</div>
    <div class="data-line"><span class="label">PLACE</span> AKTO Art &amp; Design College</div>
    <div class="data-line"><span class="label">ADDRESS</span> Evelpidon 11A, Athens 113 62</div>
  </div>
</div>

<div class="map-wrap">
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-text">Loading location data...</div>
    <div class="loading-bar">
      <div class="loading-fill" id="loadingFill"></div>
    </div>
  </div>

  <div class="map-content" id="mapContent">
    <img src="Live%20Location.png" alt="Map showing AKTO Athens area">
    <div class="location-dot" id="locationDot"></div>
  </div>
</div>

<div class="note" id="noteBox">
  <span class="live">Last seen: now</span>
  <span>Accuracy: 3m</span>
  <span>Location services remain active.</span>
</div>

</div>

<script>
window.addEventListener("load", function(){
  const loadingFill = document.getElementById("loadingFill");
  const loadingScreen = document.getElementById("loadingScreen");
  const mapContent = document.getElementById("mapContent");
  const locationDot = document.getElementById("locationDot");
  const hiddenInfo = document.getElementById("hiddenInfo");
  const noteBox = document.getElementById("noteBox");
  const statusValue = document.getElementById("statusValue");
  const statusText = document.getElementById("statusText");

  const finalMessage = "We see you. You don’t.";
  let i = 0;

  setTimeout(function(){
    loadingFill.style.width = "100%";
  }, 100);

  setTimeout(function(){
    loadingScreen.style.display = "none";
    mapContent.classList.add("show");

    hiddenInfo.classList.add("show");
    noteBox.classList.add("show");
    statusValue.textContent = "ACTIVE";
    statusValue.classList.remove("pending");
    statusValue.classList.add("active");

    setTimeout(function(){
      locationDot.classList.add("show");

      setTimeout(function(){
        statusText.innerHTML = '<span id="typedMsg"></span><span class="typing-cursor">_</span>';
        typeMessage();
      }, 600);
    }, 700);
  }, 4400);

  function typeMessage(){
    const typedMsg = document.getElementById("typedMsg");
    if (i < finalMessage.length){
      typedMsg.textContent += finalMessage.charAt(i);
      i++;
      setTimeout(typeMessage, 65);
    }
  }
});
</script>

</body>
</html>
