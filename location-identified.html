<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Identified</title>

<style>
body{
background:#0e0e10;
color:#f2f2f2;
font-family:Arial, Helvetica, sans-serif;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
margin:0;
padding:24px;
}

.container{
width:100%;
max-width:780px;
background:#151518;
border:1px solid #2b2b30;
padding:30px;
}

.small{
font-size:12px;
letter-spacing:1px;
color:#9a9aa3;
margin-bottom:10px;
}

h1{
margin:0 0 14px 0;
font-size:30px;
font-weight:700;
}

.status{
font-size:14px;
color:#9a9aa3;
margin-bottom:22px;
}

.data-box{
border:1px solid #2b2b30;
background:#101013;
padding:16px;
margin-bottom:18px;
}

.data-line{
font-size:14px;
line-height:1.8;
color:#d7d7dd;
word-break:break-word;
}

.label{
color:#9a9aa3;
display:inline-block;
min-width:120px;
}

.map-wrap{
position:relative;
border:1px solid #2b2b30;
background:#101013;
padding:10px;
overflow:hidden;
}

.map-wrap img{
display:block;
width:100%;
height:auto;
}

.location-dot{
position:absolute;
width:16px;
height:16px;
background:#1a73e8;
border:3px solid #ffffff;
border-radius:50%;
box-shadow:0 0 0 2px rgba(26,115,232,0.25);
top:43%;
left:48%;
transform:translate(-50%,-50%);
z-index:3;
}

.location-dot::after{
content:"";
position:absolute;
top:50%;
left:50%;
width:34px;
height:34px;
background:rgba(26,115,232,0.22);
border-radius:50%;
transform:translate(-50%,-50%);
animation:pulse 2s ease-out infinite;
}

.note{
margin-top:14px;
font-size:12px;
color:#9a9aa3;
}

@keyframes pulse{
0%{
transform:translate(-50%,-50%) scale(0.6);
opacity:0.9;
}
100%{
transform:translate(-50%,-50%) scale(1.8);
opacity:0;
}
}

@media (max-width:600px){
.container{
padding:20px;
}

h1{
font-size:26px;
}

.label{
display:block;
min-width:auto;
margin-bottom:2px;
}

.location-dot{
width:14px;
height:14px;
border-width:2px;
}
}
</style>
</head>
<body>

<div class="container">

<div class="small">LOCATION INTERFACE</div>

<h1>Location Identified</h1>

<div class="status">Signal received. Position confirmed.</div>

<div class="data-box">
  <div class="data-line"><span class="label">STATUS</span> ACTIVE</div>
  <div class="data-line"><span class="label">LATITUDE</span> 37.9951914</div>
  <div class="data-line"><span class="label">LONGITUDE</span> 23.7329735</div>
  <div class="data-line"><span class="label">PLACE</span> AKTO Art &amp; Design College</div>
  <div class="data-line"><span class="label">ADDRESS</span> Evelpidon 11A, Athens 113 62</div>
</div>

<div class="map-wrap">
  <img src="Live%20Location.png" alt="Map showing AKTO Athens area">
  <div class="location-dot"></div>
</div>

<div class="note">Location services remain enabled.</div>

</div>

</body>
</html>
