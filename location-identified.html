<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Identified</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-V90RVSJZCT"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-V90RVSJZCT');
</script>

<style>
body{
  background:#0e0e10;
  color:#f2f2f2;
  font-family:Arial, Helvetica, sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  margin:0;
  padding:24px;
  box-sizing:border-box;
}

.container{
  width:100%;
  max-width:780px;
  background:#151518;
  border:1px solid #2b2b30;
  padding:30px;
  box-sizing:border-box;
}

h1{
  margin:0 0 14px 0;
  font-size:30px;
  font-weight:700;
}

.status{
  display:none;
  font-size:14px;
  color:#9a9aa3;
  margin-bottom:22px;
  letter-spacing:0.6px;
  text-transform:uppercase;
}

.status.show{
  display:inline-block;
}

.map-wrap{
  position:relative;
  border:1px solid #2b2b30;
  background:#101013;
  overflow:hidden;
  animation:breathe 4.2s ease-in-out infinite;
  height:360px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:18px;
  box-sizing:border-box;
}

.loading-screen{
  width:100%;
  max-width:520px;
  text-align:left;
  padding:24px;
  box-sizing:border-box;
}

.loading-text{
  display:inline-block;
  font-size:14px;
  color:#b8b8c2;
  margin:0 0 14px 0;
  min-height:18px;
}

.loading-bar{
  width:100%;
  height:10px;
  border:1px solid #2b2b30;
  background:#0b0b0d;
  overflow:hidden;
  box-sizing:border-box;
}

.loading-fill{
  width:0%;
  height:100%;
  background:#6ea8ff;
  transition:width 7.2s linear;
}

.map-content{
  display:none;
  width:100%;
  height:100%;
  position:relative;
}

.map-content.show{
  display:block;
}

.map-content img{
  display:block;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center center;
}

.location-dot{
  position:absolute;
  width:22px;
  height:22px;
  background:#1a73e8;
  border:3px solid #ffffff;
  border-radius:50%;
  top:44%;
  left:49%;
  transform:translate(-50%,-50%);
  z-index:3;
  opacity:0;
  box-shadow:0 0 0 rgba(26,115,232,0.7);
}

.location-dot.show{
  opacity:1;
  animation:dotPulse 1.6s ease-out infinite;
}

@keyframes dotPulse{
  0%{
    box-shadow:0 0 0 0 rgba(26,115,232,0.85);
  }
  70%{
    box-shadow:0 0 0 28px rgba(26,115,232,0);
  }
  100%{
    box-shadow:0 0 0 0 rgba(26,115,232,0);
  }
}

.data-block{
  display:none;
  border:1px solid #2b2b30;
  background:#101013;
  padding:16px;
  box-sizing:border-box;
}

.data-block.show{
  display:block;
}

.data-line{
  font-size:14px;
  line-height:1.9;
  color:#d7d7dd;
  word-break:break-word;
  opacity:0;
  transform:translateY(6px);
  transition:opacity 0.35s ease, transform 0.35s ease;
}

.data-line.show{
  opacity:1;
  transform:translateY(0);
}

.label{
  color:#9a9aa3;
  display:inline-block;
  min-width:120px;
  vertical-align:top;
}

.time-value{
  color:#6ea8ff;
  font-weight:600;
}

@keyframes breathe{
  0%{
    box-shadow:0 0 0 rgba(26,115,232,0);
    border-color:#2b2b30;
  }
  50%{
    box-shadow:0 0 18px rgba(26,115,232,0.08);
    border-color:#3a4d68;
  }
  100%{
    box-shadow:0 0 0 rgba(26,115,232,0);
    border-color:#2b2b30;
  }
}

@media (max-width:600px){
  .container{
    padding:20px;
  }
  h1{
    font-size:26px;
  }
  .label{
    display:block;
    min-width:auto;
    margin-bottom:2px;
  }
  .map-wrap{
    height:300px;
  }
  .location-dot{
    width:18px;
    height:18px;
    border-width:2px;
  }
}
</style>
</head>
<body>

<div class="container">

  <h1>Location Identified</h1>
  <div class="status" id="statusText">TRACKING ACTIVE</div>

  <div class="map-wrap">
    <div class="loading-screen" id="loadingScreen">
      <div class="loading-text" id="loadingText">Loading Location Data...</div>
      <div class="loading-bar">
        <div class="loading-fill" id="loadingFill"></div>
      </div>
    </div>

    <div class="map-content" id="mapContent">
      <img src="Live%20Location.png" alt="Map showing AKTO Athens area">
      <div class="location-dot" id="locationDot"></div>
    </div>
  </div>

  <div class="data-block" id="dataBlock">
    <div class="data-line" id="dLat"><span class="label">Latitude</span> 37.9951914</div>
    <div class="data-line" id="dLng"><span class="label">Longitude</span> 23.7329735</div>
    <div class="data-line" id="dPlace"><span class="label">Location</span> AKTO Art &amp; Design College</div>
    <div class="data-line" id="dAddress"><span class="label">Address</span> Evelpidon 11A, Athens 113 62</div>
    <div class="data-line" id="dTime"><span class="label">Time</span> <span class="time-value" id="liveTime">--:--:--</span></div>
  </div>

</div>

<script>
window.addEventListener("load", function(){
  const loadingFill = document.getElementById("loadingFill");
  const loadingText = document.getElementById("loadingText");
  const mapContent = document.getElementById("mapContent");
  const locationDot = document.getElementById("locationDot");
  const statusText = document.getElementById("statusText");
  const dataBlock = document.getElementById("dataBlock");
  const liveTime = document.getElementById("liveTime");

  const loadingMessages = [
    "Loading Location Data...",
    "Cross-Referencing Movement Patterns...",
    "Packaging Behavioral Indicators...",
    "Preparing Commercially Useful Conclusions..."
  ];

  function updateClock(){
    const now = new Date();
    const h = String(now.getHours()).padStart(2,"0");
    const m = String(now.getMinutes()).padStart(2,"0");
    const s = String(now.getSeconds()).padStart(2,"0");
    liveTime.textContent = h + ":" + m + ":" + s;
  }
  updateClock();
  setInterval(updateClock, 1000);

  setTimeout(function(){
    loadingFill.style.width = "100%";
  }, 120);

  loadingMessages.forEach(function(message, index){
    setTimeout(function(){
      loadingText.textContent = message;
    }, index * 1800);
  });

  setTimeout(function(){
    document.getElementById("loadingScreen").style.display = "none";
    mapContent.classList.add("show");
    statusText.classList.add("show");

    setTimeout(function(){
      locationDot.classList.add("show");
    }, 600);

    setTimeout(function(){
      dataBlock.classList.add("show");
    }, 1200);

    setTimeout(function(){
      document.getElementById("dLat").classList.add("show");
    }, 1400);

    setTimeout(function(){
      document.getElementById("dLng").classList.add("show");
    }, 1700);

    setTimeout(function(){
      document.getElementById("dPlace").classList.add("show");
    }, 2050);

    setTimeout(function(){
      document.getElementById("dAddress").classList.add("show");
    }, 2400);

    setTimeout(function(){
      document.getElementById("dTime").classList.add("show");
    }, 2800);

  }, 7400);
});
</script>

</body>
</html>
