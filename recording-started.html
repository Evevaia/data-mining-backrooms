<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recording Started</title>

<style>
body{
background:#0e0e10;
color:#f2f2f2;
font-family:Arial, Helvetica, sans-serif;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
margin:0;
padding:24px;
}

.container{
width:100%;
max-width:760px;
background:#151518;
border:1px solid #2b2b30;
padding:30px;
position:relative;
overflow:hidden;
}

.small{
font-size:12px;
letter-spacing:1px;
color:#9a9aa3;
margin-bottom:10px;
}

h1{
margin:0 0 14px 0;
font-size:30px;
font-weight:700;
}

.status{
font-size:14px;
color:#b8b8c2;
margin-bottom:22px;
min-height:20px;
}

.permission-box{
border:1px solid #2b2b30;
background:#101013;
padding:22px;
}

.permission-title{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.permission-text{
font-size:14px;
color:#b8b8c2;
line-height:1.6;
margin-bottom:18px;
}

.countdown{
font-size:15px;
color:#ff8f8f;
margin-bottom:20px;
min-height:20px;
}

.buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:12px 18px;
font-size:14px;
border:1px solid #2b2b30;
background:#f2f2f2;
color:#111;
cursor:pointer;
transition:opacity 0.2s ease, transform 0.2s ease;
}

button:hover{
transform:translateY(-1px);
}

.accept-green{
background:#4caf50;
color:white;
border:none;
}

.hidden{
display:none !important;
}

.recording-screen{
display:none;
min-height:360px;
background:#050505;
border:1px solid #2b2b30;
padding:24px;
font-family:"Lucida Console","Courier New",monospace;
}

.recording-screen.show{
display:block;
}

.big-ohwell{
font-size:42px;
font-weight:700;
letter-spacing:0.02em;
margin-bottom:24px;
}

.rec-line{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
margin-bottom:18px;
}

.rec-dot{
width:12px;
height:12px;
background:#ff4d4d;
border-radius:50%;
box-shadow:0 0 12px rgba(255,77,77,0.65);
animation:recBlink 1s ease-in-out infinite;
}

.timer{
font-size:18px;
color:#b8b8c2;
margin-bottom:26px;
}

.analysis{
font-size:18px;
line-height:1.8;
white-space:pre-wrap;
min-height:180px;
}

.cursor{
display:inline-block;
animation:blink 1s steps(1) infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

@keyframes recBlink{
0%{opacity:1;}
50%{opacity:0.35;}
100%{opacity:1;}
}

@media (max-width:600px){
.container{
padding:20px;
}

h1{
font-size:26px;
}

.permission-title{
font-size:19px;
}

.big-ohwell{
font-size:32px;
}

.analysis{
font-size:16px;
}
}
</style>
</head>
<body>

<div class="container">

<div id="permissionScreen">
  <div class="small">ACCESS INTERFACE</div>
  <h1>Permission Request</h1>
  <div class="status">Awaiting response.</div>

  <div class="permission-box">
    <div class="permission-title">Microphone &amp; Camera Access Required</div>
    <div class="permission-text">
      This experience requires full audiovisual access in order to continue.
    </div>
    <div class="countdown" id="countdownText">Your acceptance will be mandatory in 5...</div>

    <div class="buttons">
      <button onclick="forceAccept()">ACCEPT</button>
      <button class="accept-green" onclick="forceAccept()">ACCEPT</button>
    </div>
  </div>
</div>

<div class="recording-screen" id="recordingScreen">
  <div class="big-ohwell">OH WELL!</div>

  <div class="rec-line">
    <div class="rec-dot"></div>
    <div>REC</div>
  </div>

  <div class="timer" id="timerText">00:00:00</div>

  <div class="analysis" id="analysisText"></div><span class="cursor" id="cursor">_</span>
</div>

</div>

<script>
let countdown = 5;
let countdownStarted = false;
let accepted = false;
let timerInterval;

const lines = [
  "MICROPHONE: ACTIVE",
  "CAMERA: ACTIVE",
  "VOICEPRINT: MATCHED",
  "AMBIENT AUDIO: CAPTURED",
  "BACKGROUND MOVEMENT: DETECTED",
  "WE CAN HEAR YOU NOW."
];

let lineIndex = 0;
let charIndex = 0;

window.addEventListener("load", function(){
  startCountdown();
});

function startCountdown(){
  if (countdownStarted) return;
  countdownStarted = true;

  const countdownText = document.getElementById("countdownText");

  const interval = setInterval(function(){
    countdown--;
    if (countdown > 0){
      countdownText.textContent = "Your acceptance will be mandatory in " + countdown + "...";
    } else {
      countdownText.textContent = "Your acceptance is now mandatory.";
      clearInterval(interval);

      setTimeout(function(){
        if (!accepted){
          forceAccept();
        }
      }, 500);
    }
  }, 1000);
}

function forceAccept(){
  if (accepted) return;
  accepted = true;

  document.getElementById("permissionScreen").classList.add("hidden");
  document.getElementById("recordingScreen").classList.add("show");

  startTimer();

  setTimeout(function(){
    typeLine();
  }, 700);
}

function startTimer(){
  let seconds = 0;
  const timerText = document.getElementById("timerText");

  timerInterval = setInterval(function(){
    seconds++;
    const hrs = String(Math.floor(seconds / 3600)).padStart(2, "0");
    const mins = String(Math.floor((seconds % 3600) / 60)).padStart(2, "0");
    const secs = String(seconds % 60).padStart(2, "0");
    timerText.textContent = hrs + ":" + mins + ":" + secs;
  }, 1000);
}

function typeLine(){
  const analysisText = document.getElementById("analysisText");
  const cursor = document.getElementById("cursor");

  if (lineIndex >= lines.length){
    cursor.remove();
    return;
  }

  const currentLine = lines[lineIndex];

  if (charIndex < currentLine.length){
    analysisText.textContent += currentLine.charAt(charIndex);
    charIndex++;
    setTimeout(typeLine, 55);
  } else {
    analysisText.textContent += "\n";
    lineIndex++;
    charIndex = 0;
    setTimeout(typeLine, 260);
  }
}
</script>

</body>
</html>
