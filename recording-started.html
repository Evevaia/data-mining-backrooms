<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recording Started</title>

<style>
body{
  background:#0e0e10;
  color:#f2f2f2;
  font-family:Arial, Helvetica, sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  margin:0;
  padding:20px;
  box-sizing:border-box;
}

.container{
  width:100%;
  max-width:760px;
  background:#151518;
  border:1px solid #2b2b30;
  padding:26px;
  box-sizing:border-box;
}

.small{
  font-size:12px;
  letter-spacing:1px;
  color:#9a9aa3;
  margin-bottom:10px;
  text-transform:uppercase;
}

h1{
  margin:0 0 14px 0;
  font-size:28px;
}

.status{
  font-size:14px;
  color:#b8b8c2;
  margin-bottom:20px;
}

.permission-box{
  border:1px solid #2b2b30;
  background:#101013;
  padding:20px;
}

.permission-title{
  font-size:20px;
  font-weight:700;
  margin-bottom:10px;
}

.permission-text{
  font-size:14px;
  color:#b8b8c2;
  line-height:1.6;
  margin-bottom:18px;
}

.countdown{
  font-size:15px;
  color:#ff8f8f;
  margin-bottom:20px;
}

.buttons{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{
  padding:12px 18px;
  font-size:14px;
  border:1px solid #2b2b30;
  background:#f2f2f2;
  color:#111;
  cursor:pointer;
}

.accept-green{
  background:#4caf50;
  color:white;
  border:none;
}

.hidden{
  display:none !important;
}

.recording-screen{
  display:none;
  min-height:320px;
  background:#050505;
  border:1px solid #2b2b30;
  padding:22px;
  box-sizing:border-box;
}

.recording-screen.show{
  display:block;
}

.recording-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:18px;
  flex-wrap:wrap;
  margin-bottom:26px;
}

.big-ohwell{
  font-size:32px;
  font-weight:700;
  margin:0;
  letter-spacing:0.3px;
}

.rec-side{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:10px;
}

.rec-line{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:22px;
  font-weight:700;
  letter-spacing:1.2px;
  color:#f2f2f2;
}

.rec-dot{
  width:14px;
  height:14px;
  background:#ff4d4d;
  border-radius:50%;
  animation:recBlink 1s infinite;
  flex-shrink:0;
}

.timer{
  font-size:24px;
  font-weight:700;
  color:#b8b8c2;
  letter-spacing:1px;
}

.analysis-shell{
  border:1px solid #2b2b30;
  background:#101013;
  padding:16px;
  min-height:210px;
  box-sizing:border-box;
}

.analysis-title{
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:#8e8e97;
  margin-bottom:14px;
}

.analysis{
  font-size:15px;
  line-height:1.75;
  color:#d7d7dd;
  white-space:pre-wrap;
  min-height:150px;
}

.cursor{
  display:inline-block;
  margin-left:2px;
  animation:blink 1s steps(1) infinite;
  color:#6ea8ff;
}

@keyframes blink{
  50%{opacity:0;}
}

@keyframes recBlink{
  50%{opacity:0.3;}
}

@media (max-width:600px){
  .container{
    padding:18px;
  }

  h1{
    font-size:24px;
  }

  .permission-title{
    font-size:18px;
  }

  .big-ohwell{
    font-size:26px;
  }

  .rec-line{
    font-size:18px;
  }

  .timer{
    font-size:20px;
  }

  .analysis{
    font-size:14px;
  }

  .recording-top{
    align-items:flex-start;
  }

  .rec-side{
    align-items:flex-start;
  }
}
</style>
</head>

<body>

<div class="container">

  <div id="permissionScreen">

    <div class="small">Access Interface</div>
    <h1>Permission Request</h1>

    <div class="status">Awaiting response.</div>

    <div class="permission-box">

      <div class="permission-title">
        Microphone &amp; Camera Access Required
      </div>

      <div class="permission-text">
        This experience requires full audiovisual access in order to continue.
      </div>

      <div class="countdown" id="countdownText">
        Your acceptance will be mandatory in 10...
      </div>

      <div class="buttons">
        <button onclick="forceAccept()">ACCEPT</button>
        <button class="accept-green" onclick="forceAccept()">ACCEPT</button>
      </div>

    </div>
  </div>

  <div class="recording-screen" id="recordingScreen">

    <div class="recording-top">
      <h2 class="big-ohwell">ACCESS GRANTED</h2>

      <div class="rec-side">
        <div class="rec-line">
          <div class="rec-dot"></div>
          <div>REC</div>
        </div>

        <div class="timer" id="timerText">00:00:00</div>
      </div>
    </div>

    <div class="analysis-shell">
      <div class="analysis-title">Live Processing Notes</div>

      <div class="analysis" id="analysisText"><span id="cursor" class="cursor">|</span></div>
    </div>

  </div>

</div>

<script>
let countdown = 10;
let accepted = false;
let timerInterval;

const lines = [
  "Nice room tone.",
  "Face detected. Confidence: unnecessary.",
  "Voice pattern saved for later judgment.",
  "Lighting conditions: emotionally revealing.",
  "General composure: holding, somehow."
];

let lineIndex = 0;
let charIndex = 0;

window.onload = function(){
  startCountdown();
};

function startCountdown(){
  const countdownText = document.getElementById("countdownText");

  const interval = setInterval(function(){
    countdown--;

    if(countdown > 0){
      countdownText.textContent =
        "Your acceptance will be mandatory in " + countdown + "...";
    }else{
      countdownText.textContent =
        "Your acceptance is now mandatory.";

      clearInterval(interval);

      setTimeout(function(){
        if(!accepted){
          forceAccept();
        }
      }, 500);
    }
  }, 1000);
}

function forceAccept(){
  accepted = true;

  document
    .getElementById("permissionScreen")
    .classList.add("hidden");

  document
    .getElementById("recordingScreen")
    .classList.add("show");

  startTimer();

  setTimeout(typeLine, 700);
}

function startTimer(){
  let seconds = 0;
  const timerText = document.getElementById("timerText");

  timerInterval = setInterval(function(){
    seconds++;

    const hrs = String(Math.floor(seconds / 3600)).padStart(2,"0");
    const mins = String(Math.floor((seconds % 3600) / 60)).padStart(2,"0");
    const secs = String(seconds % 60).padStart(2,"0");

    timerText.textContent = hrs + ":" + mins + ":" + secs;
  }, 1000);
}

function typeLine(){
  const analysisText = document.getElementById("analysisText");
  const cursor = document.getElementById("cursor");

  if(lineIndex >= lines.length){
    cursor.remove();
    return;
  }

  const currentLine = lines[lineIndex];

  if(charIndex < currentLine.length){
    cursor.insertAdjacentText("beforebegin", currentLine.charAt(charIndex));
    charIndex++;

    const speed = 32 + Math.random() * 40;
    setTimeout(typeLine, speed);
  }else{
    cursor.insertAdjacentText("beforebegin", "\n");

    lineIndex++;
    charIndex = 0;

    setTimeout(typeLine, 350 + Math.random() * 250);
  }
}
</script>

</body>
</html>
