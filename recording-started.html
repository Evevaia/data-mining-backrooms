<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recording Started</title>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-V90RVSJZCT"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-V90RVSJZCT');
</script>
<style>
*{
  box-sizing:border-box;
}
html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:#0e0e10;
  color:#f2f2f2;
  font-family:Arial, Helvetica, sans-serif;
}
body{
  min-height:100vh;
}

/* ---------------- PERMISSION SCREEN ---------------- */
.permission-stage{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.permission-wrap{
  width:100%;
  max-width:760px;
  background:#151518;
  border:1px solid #2b2b30;
  padding:26px;
}
.permission-wrap h1{
  margin:0 0 14px 0;
  font-size:28px;
  font-weight:700;
}
.status{
  font-size:14px;
  color:#b8b8c2;
  margin-bottom:20px;
}
.permission-box{
  border:1px solid #2b2b30;
  background:#101013;
  padding:20px;
}
.permission-title{
  font-size:20px;
  font-weight:700;
  margin-bottom:10px;
}
.permission-text{
  font-size:14px;
  color:#b8b8c2;
  line-height:1.6;
  margin-bottom:18px;
}
.countdown{
  font-size:15px;
  color:#ff8f8f;
  margin-bottom:20px;
}
.buttons{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
button{
  padding:12px 18px;
  font-size:14px;
  border:1px solid #2b2b30;
  background:#f2f2f2;
  color:#111;
  cursor:pointer;
}
.accept-green{
  background:#4caf50;
  color:#fff;
  border:none;
}
.hidden{
  display:none !important;
}

/* ---------------- BLACK TRANSITION ---------------- */
.transition-screen{
  display:none;
  position:fixed;
  inset:0;
  background:#050506;
  z-index:20;
}
.transition-screen.show{
  display:block;
}

/* ---------------- RECORDING SCREEN ---------------- */
.recording-screen{
  display:none;
  min-height:100vh;
  width:100%;
  padding:48px 28px;
  position:relative;
  background:#0e0e10;
}
.recording-screen.show{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-start;
}

/* subtle ambient texture */
.recording-screen::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:0.04;
  background-image:
    radial-gradient(circle at 20% 20%, #ffffff 0 1px, transparent 1px),
    radial-gradient(circle at 80% 30%, #ffffff 0 1px, transparent 1px),
    radial-gradient(circle at 35% 70%, #ffffff 0 1px, transparent 1px),
    radial-gradient(circle at 60% 80%, #ffffff 0 1px, transparent 1px);
  background-size:240px 240px;
}

/* slightly off-center wrapper */
.recording-wrap{
  width:min(620px, 90vw);
  margin-left:48%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:flex-start;
}

/* harsher, less polished block */
.recording-block{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:14px;
  padding:17px 18px;
  border:1px solid #26262b;
  background:rgba(13,13,16,0.9);
  min-width:320px;
  max-width:90vw;
}
.recording-sub{
  font-size:11px;
  letter-spacing:0.22em;
  color:#66666f;
  text-transform:uppercase;
}
.recording-title{
  margin:0;
  font-size:32px;
  font-weight:700;
  letter-spacing:0.04em;
  line-height:1;
}
.recording-meta{
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
}
.rec-line{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:28px;
  letter-spacing:0.14em;
  line-height:1;
}
.rec-dot{
  width:13px;
  height:13px;
  border-radius:50%;
  background:#ff4d4d;
  animation:recBlink 1s infinite;
  flex-shrink:0;
}
.timer{
  font-size:15px;
  color:#9f9faa;
  letter-spacing:0.18em;
}

/* typed line outside block */
.typed-message{
  margin-top:32px;
  min-height:36px;
  width:min(520px, 90vw);
}
.typed-line{
  font-size:28px;
  line-height:1.4;
  color:#6f6f78;
  letter-spacing:0.01em;
}
.cursor{
  display:inline-block;
  margin-left:2px;
  animation:blink 1s steps(1) infinite;
}

@keyframes blink{
  50%{opacity:0;}
}
@keyframes recBlink{
  50%{opacity:0.25;}
}

@media (max-width:600px){
  .permission-wrap{
    padding:18px;
  }
  .permission-wrap h1{
    font-size:24px;
  }
  .permission-title{
    font-size:18px;
  }
  .recording-screen{
    padding:32px 18px;
    align-items:center;
  }
  .recording-wrap{
    width:100%;
    margin-left:0;
    transform:none;
  }
  .recording-block{
    min-width:unset;
    width:100%;
  }
  .recording-title{
    font-size:24px;
  }
  .rec-line{
    font-size:22px;
  }
  .typed-line{
    font-size:22px;
  }
}
</style>
</head>
<body>

<!-- PERMISSION SCREEN -->
<div class="permission-stage" id="permissionScreen">
  <div class="permission-wrap">
    <h1>Permission Request</h1>
    <div class="status">Awaiting response.</div>

    <div class="permission-box">
      <div class="permission-title">Microphone &amp; Camera Access Required</div>
      <div class="permission-text">
        This experience requires full audiovisual access in order to continue.
      </div>
      <div class="countdown" id="countdownText">Your acceptance will be mandatory in 10...</div>

      <div class="buttons">
        <button onclick="forceAccept()">ACCEPT</button>
        <button class="accept-green" onclick="forceAccept()">ACCEPT</button>
      </div>
    </div>
  </div>
</div>

<!-- BLACK PAUSE -->
<div class="transition-screen" id="transitionScreen"></div>

<!-- RECORDING SCREEN -->
<div class="recording-screen" id="recordingScreen">
  <div class="recording-wrap">
    <div class="recording-block">
      <div class="recording-sub">capture active</div>
      <h2 class="recording-title">RECORDING STARTED</h2>

      <div class="recording-meta">
        <div class="rec-line">
          <div class="rec-dot"></div>
          <div>REC</div>
        </div>
        <div class="timer" id="timerText">00:00:00</div>
      </div>
    </div>

    <div class="typed-message">
      <div class="typed-line" id="typedLine"></div>
    </div>
  </div>
</div>

<script>
let countdown = 10;
let accepted = false;
let timerStarted = false;
let messageStarted = false;

window.onload = function(){
  startCountdown();
};

function startCountdown(){
  const countdownText = document.getElementById("countdownText");

  const interval = setInterval(function(){
    countdown--;

    if(countdown > 0){
      countdownText.textContent = "Your acceptance will be mandatory in " + countdown + "...";
    } else {
      countdownText.textContent = "Your acceptance is now mandatory.";
      clearInterval(interval);

      setTimeout(function(){
        if(!accepted){
          forceAccept();
        }
      }, 500);
    }
  }, 1000);
}

function forceAccept(){
  if(accepted) return;
  accepted = true;

  document.getElementById("permissionScreen").classList.add("hidden");
  document.getElementById("transitionScreen").classList.add("show");

  setTimeout(function(){
    document.getElementById("transitionScreen").classList.remove("show");
    document.getElementById("recordingScreen").classList.add("show");

    if(!timerStarted){
      startTimer();
      timerStarted = true;
    }

    if(!messageStarted){
      messageStarted = true;
      typeMessage();
    }
  }, 420);
}

function startTimer(){
  let seconds = 0;
  const timerText = document.getElementById("timerText");

  setInterval(function(){
    seconds++;
    const h = String(Math.floor(seconds / 3600)).padStart(2,"0");
    const m = String(Math.floor((seconds % 3600) / 60)).padStart(2,"0");
    const s = String(seconds % 60).padStart(2,"0");
    timerText.textContent = h + ":" + m + ":" + s;
  }, 1000);
}

function typeMessage(){
  const lineEl = document.getElementById("typedLine");
  const partOne = "Ha.";
  const partTwo = " Nice.";
  let text = "";
  let index = 0;

  lineEl.innerHTML = '<span class="cursor">_</span>';

  function typeFirst(){
    if(index < partOne.length){
      text += partOne.charAt(index);
      lineEl.innerHTML = text + '<span class="cursor">_</span>';
      index++;
      setTimeout(typeFirst, 380 + Math.random() * 180);
    } else {
      setTimeout(function(){
        index = 0;
        typeSecond();
      }, 1800);
    }
  }

  function typeSecond(){
    if(index < partTwo.length){
      text += partTwo.charAt(index);
      lineEl.innerHTML = text + '<span class="cursor">_</span>';
      index++;
      setTimeout(typeSecond, 420 + Math.random() * 200);
    } else {
      lineEl.innerHTML = text + '<span class="cursor">_</span>';
    }
  }

  setTimeout(typeFirst, 1300);
}
</script>
</body>
</html>
