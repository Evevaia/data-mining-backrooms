<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recording Started</title>

<style>
body{
  background:#0e0e10;
  color:#f2f2f2;
  font-family:Arial, Helvetica, sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  margin:0;
  padding:20px;
  box-sizing:border-box;
}

.container{
  width:100%;
  max-width:760px;
  background:#151518;
  border:1px solid #2b2b30;
  padding:26px;
  box-sizing:border-box;
}

h1{
  margin:0 0 14px 0;
  font-size:28px;
}

.status{
  font-size:14px;
  color:#b8b8c2;
  margin-bottom:20px;
}

.permission-box{
  border:1px solid #2b2b30;
  background:#101013;
  padding:20px;
}

.permission-title{
  font-size:20px;
  font-weight:700;
  margin-bottom:10px;
}

.permission-text{
  font-size:14px;
  color:#b8b8c2;
  line-height:1.6;
  margin-bottom:18px;
}

.countdown{
  font-size:15px;
  color:#ff8f8f;
  margin-bottom:20px;
}

.buttons{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{
  padding:12px 18px;
  font-size:14px;
  border:1px solid #2b2b30;
  background:#f2f2f2;
  color:#111;
  cursor:pointer;
}

.accept-green{
  background:#4caf50;
  color:white;
  border:none;
}

.hidden{
  display:none !important;
}

.recording-screen{
  display:none;
  min-height:360px;
  background:#050505;
  border:1px solid #2b2b30;
  padding:28px 24px;
  box-sizing:border-box;
}

.recording-screen.show{
  display:block;
}

.recording-header{
  display:inline-flex;
  flex-direction:column;
  gap:14px;
  padding:16px 18px;
  border:1px solid #2b2b30;
  background:#0d0d10;
  margin-bottom:34px;
}

.recording-title{
  margin:0;
  font-size:30px;
  font-weight:700;
  letter-spacing:0.3px;
  line-height:1;
}

.recording-meta{
  display:flex;
  align-items:center;
  gap:14px;
  flex-wrap:wrap;
}

.rec-line{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:30px;
  font-weight:400;
  letter-spacing:1.3px;
  color:#f2f2f2;
  line-height:1;
}

.rec-dot{
  width:14px;
  height:14px;
  background:#ff4d4d;
  border-radius:50%;
  animation:recBlink 1s infinite;
  flex-shrink:0;
}

.timer{
  font-size:16px;
  font-weight:400;
  color:#b8b8c2;
  letter-spacing:0.8px;
  line-height:1;
}

.free-text-area{
  min-height:120px;
  display:flex;
  align-items:flex-start;
}

.typed-line{
  font-size:24px;
  line-height:1.5;
  color:#d7d7dd;
  min-height:40px;
}

.cursor{
  display:inline-block;
  margin-left:3px;
  animation:blink 1s steps(1) infinite;
  color:inherit;
  vertical-align:baseline;
}

@keyframes blink{
  50%{opacity:0;}
}

@keyframes recBlink{
  50%{opacity:0.3;}
}

@media (max-width:600px){
  .container{
    padding:18px;
  }

  h1{
    font-size:24px;
  }

  .permission-title{
    font-size:18px;
  }

  .recording-screen{
    padding:20px 18px;
    min-height:300px;
  }

  .recording-title{
    font-size:24px;
  }

  .rec-line{
    font-size:24px;
  }

  .timer{
    font-size:14px;
  }

  .typed-line{
    font-size:20px;
  }

  .recording-header{
    width:100%;
    margin-bottom:28px;
  }

  .recording-meta{
    align-items:flex-start;
  }
}
</style>
</head>

<body>

<div class="container">

  <div id="permissionScreen">

    <h1>Permission Request</h1>

    <div class="status">Awaiting response.</div>

    <div class="permission-box">

      <div class="permission-title">
        Microphone &amp; Camera Access Required
      </div>

      <div class="permission-text">
        This experience requires full audiovisual access in order to continue.
      </div>

      <div class="countdown" id="countdownText">
        Your acceptance will be mandatory in 10...
      </div>

      <div class="buttons">
        <button onclick="forceAccept()">ACCEPT</button>
        <button class="accept-green" onclick="forceAccept()">ACCEPT</button>
      </div>

    </div>
  </div>

  <div class="recording-screen" id="recordingScreen">

    <div class="recording-header">
      <h2 class="recording-title">RECORDING STARTED</h2>

      <div class="recording-meta">
        <div class="rec-line">
          <div class="rec-dot"></div>
          <div>REC</div>
        </div>

        <div class="timer" id="timerText">00:00:00</div>
      </div>
    </div>

    <div class="free-text-area">
      <div class="typed-line" id="typedLine"></div>
    </div>

  </div>

</div>

<script>
let countdown = 10;
let accepted = false;
let timerInterval;

window.onload = function(){
  startCountdown();
};

function startCountdown(){
  const countdownText = document.getElementById("countdownText");

  const interval = setInterval(function(){
    countdown--;

    if(countdown > 0){
      countdownText.textContent =
        "Your acceptance will be mandatory in " + countdown + "...";
    }else{
      countdownText.textContent =
        "Your acceptance is now mandatory.";

      clearInterval(interval);

      setTimeout(function(){
        if(!accepted){
          forceAccept();
        }
      }, 500);
    }
  }, 1000);
}

function forceAccept(){
  accepted = true;

  document.getElementById("permissionScreen").classList.add("hidden");
  document.getElementById("recordingScreen").classList.add("show");

  startTimer();

  setTimeout(function(){
    typeHaNice();
  }, 700);
}

function startTimer(){
  let seconds = 0;
  const timerText = document.getElementById("timerText");

  timerInterval = setInterval(function(){
    seconds++;

    const hrs = String(Math.floor(seconds / 3600)).padStart(2,"0");
    const mins = String(Math.floor((seconds % 3600) / 60)).padStart(2,"0");
    const secs = String(seconds % 60).padStart(2,"0");

    timerText.textContent = hrs + ":" + mins + ":" + secs;
  }, 1000);
}

function typeHaNice(){
  const lineEl = document.getElementById("typedLine");
  const partOne = "Ha.";
  const partTwo = " Nice.";

  let text = "";
  let index = 0;

  function typeFirstPart(){
    if(index < partOne.length){
      text += partOne.charAt(index);
      lineEl.innerHTML = text + '<span class="cursor">_</span>';
      index++;
      setTimeout(typeFirstPart, 110 + Math.random() * 50);
    }else{
      setTimeout(function(){
        index = 0;
        typeSecondPart();
      }, 700);
    }
  }

  function typeSecondPart(){
    if(index < partTwo.length){
      text += partTwo.charAt(index);
      lineEl.innerHTML = text + '<span class="cursor">_</span>';
      index++;
      setTimeout(typeSecondPart, 110 + Math.random() * 50);
    }else{
      lineEl.textContent = text;
    }
  }

  typeFirstPart();
}
</script>

</body>
</html>
