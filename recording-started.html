<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recording Started</title>

<style>

body{
background:#0e0e10;
color:#f2f2f2;
font-family:Arial, Helvetica, sans-serif;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
margin:0;
padding:20px;
}

.container{
width:100%;
max-width:760px;
background:#151518;
border:1px solid #2b2b30;
padding:26px;
}

.small{
font-size:12px;
letter-spacing:1px;
color:#9a9aa3;
margin-bottom:10px;
}

h1{
margin:0 0 14px 0;
font-size:28px;
}

.status{
font-size:14px;
color:#b8b8c2;
margin-bottom:20px;
}

.permission-box{
border:1px solid #2b2b30;
background:#101013;
padding:20px;
}

.permission-title{
font-size:20px;
font-weight:700;
margin-bottom:10px;
}

.permission-text{
font-size:14px;
color:#b8b8c2;
line-height:1.6;
margin-bottom:18px;
}

.countdown{
font-size:15px;
color:#ff8f8f;
margin-bottom:20px;
}

.buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:12px 18px;
font-size:14px;
border:1px solid #2b2b30;
background:#f2f2f2;
color:#111;
cursor:pointer;
}

.accept-green{
background:#4caf50;
color:white;
border:none;
}

.hidden{
display:none !important;
}

.recording-screen{
display:none;
min-height:320px;
background:#050505;
border:1px solid #2b2b30;
padding:20px;
font-family:"Courier New", monospace;
}

.recording-screen.show{
display:block;
}

.big-ohwell{
font-size:36px;
font-weight:700;
margin-bottom:20px;
}

.rec-line{
display:flex;
align-items:center;
gap:10px;
font-size:20px;
margin-bottom:15px;
}

.rec-dot{
width:10px;
height:10px;
background:#ff4d4d;
border-radius:50%;
animation:recBlink 1s infinite;
}

.timer{
font-size:16px;
color:#b8b8c2;
margin-bottom:20px;
}

.analysis{
font-size:16px;
line-height:1.7;
white-space:pre-wrap;
color:#e6e6e6;
}

.cursor{
animation:blink 1s steps(1) infinite;
}

@keyframes blink{
50%{opacity:0;}
}

@keyframes recBlink{
50%{opacity:0.3;}
}

@media (max-width:600px){

.container{
padding:18px;
}

h1{
font-size:24px;
}

.permission-title{
font-size:18px;
}

.big-ohwell{
font-size:28px;
}

.analysis{
font-size:15px;
}

}

</style>
</head>

<body>

<div class="container">

<div id="permissionScreen">

<div class="small">ACCESS INTERFACE</div>
<h1>Permission Request</h1>

<div class="status">Awaiting response.</div>

<div class="permission-box">

<div class="permission-title">
Microphone & Camera Access Required
</div>

<div class="permission-text">
This experience requires full audiovisual access in order to continue.
</div>

<div class="countdown" id="countdownText">
Your acceptance will be mandatory in 10...
</div>

<div class="buttons">
<button onclick="forceAccept()">ACCEPT</button>
<button class="accept-green" onclick="forceAccept()">ACCEPT</button>
</div>

</div>
</div>


<div class="recording-screen" id="recordingScreen">

<div class="big-ohwell">ACCESS GRANTED</div>

<div class="rec-line">
<div class="rec-dot"></div>
<div>REC</div>
</div>

<div class="timer" id="timerText">00:00:00</div>

<div class="analysis" id="analysisText">
<span id="cursor" class="cursor">|</span>
</div>

</div>

</div>

<script>

let countdown = 10
let accepted = false
let timerInterval

const lines = [

"[SYSTEM] Initializing interface...",
"[ACCESS] Microphone channel opened",
"[ACCESS] Camera stream connected",
"[SCAN] Voiceprint analysis started",
"[SCAN] Ambient noise calibration",
"[SCAN] Facial structure mapping",
"[ANALYSIS] Emotional response pattern",
"[DATA] Background movement detected",
"[MATCH] Biometric pattern stored",
"[SYSTEM] Recording session active"

]

let lineIndex = 0
let charIndex = 0

window.onload = function(){
startCountdown()
}

function startCountdown(){

const countdownText = document.getElementById("countdownText")

const interval = setInterval(function(){

countdown--

if(countdown > 0){

countdownText.textContent =
"Your acceptance will be mandatory in " + countdown + "..."

}else{

countdownText.textContent =
"Your acceptance is now mandatory."

clearInterval(interval)

setTimeout(function(){

if(!accepted){
forceAccept()
}

},500)

}

},1000)

}

function forceAccept(){

accepted = true

document
.getElementById("permissionScreen")
.classList.add("hidden")

document
.getElementById("recordingScreen")
.classList.add("show")

startTimer()

setTimeout(typeLine,700)

}

function startTimer(){

let seconds = 0
const timerText = document.getElementById("timerText")

timerInterval = setInterval(function(){

seconds++

const hrs = String(Math.floor(seconds/3600)).padStart(2,"0")
const mins = String(Math.floor((seconds%3600)/60)).padStart(2,"0")
const secs = String(seconds%60).padStart(2,"0")

timerText.textContent = hrs + ":" + mins + ":" + secs

},1000)

}

function typeLine(){

const analysisText = document.getElementById("analysisText")
const cursor = document.getElementById("cursor")

if(lineIndex >= lines.length){
cursor.remove()
return
}

const currentLine = lines[lineIndex]

if(charIndex < currentLine.length){

cursor.insertAdjacentText("beforebegin", currentLine.charAt(charIndex))

charIndex++

const speed = 35 + Math.random()*60

setTimeout(typeLine,speed)

}else{

cursor.insertAdjacentText("beforebegin","\n")

lineIndex++
charIndex = 0

setTimeout(typeLine,250 + Math.random()*400)

}

}

</script>

</body>
</html>
